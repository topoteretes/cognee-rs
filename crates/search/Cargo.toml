[package]
name = "cognee-search"
version.workspace = true
edition.workspace = true

[dependencies]
cognee-embedding = { path = "../embedding" }
cognee-database = { path = "../database" }
cognee-graph = { path = "../graph" }
cognee-llm = { path = "../llm" }
cognee-vector = { path = "../vector" }

async-trait.workspace = true
serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true
chrono.workspace = true
schemars.workspace = true
thiserror.workspace = true
uuid = { workspace = true, features = ["serde", "v4"] }

[dev-dependencies]
cognee-database = { path = "../database", features = ["testing"] }
cognee-graph = { path = "../graph", features = ["testing"] }
cognee-models = { path = "../models" }
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
