[package]
name = "cognee-search"
version.workspace = true
edition.workspace = true

[features]
default = []
telemetry = ["cognee-telemetry/telemetry"]

[dependencies]
cognee-embedding = { path = "../embedding" }
cognee-database = { path = "../database" }
cognee-graph = { path = "../graph" }
cognee-llm = { path = "../llm" }
cognee-session = { path = "../session", features = ["sea-orm-store"] }
cognee-telemetry = { path = "../telemetry" }
cognee-utils = { path = "../utils" }
cognee-vector = { path = "../vector" }

async-trait.workspace = true
indexmap = "2"
regex = "1"
tokio = { workspace = true, features = ["sync"] }
serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true
chrono.workspace = true
schemars.workspace = true
thiserror.workspace = true
tracing.workspace = true
uuid = { workspace = true, features = ["serde", "v4"] }

[dev-dependencies]
cognee-database  = { path = "../database" }
cognee-embedding = { path = "../embedding", features = ["onnx"] }
cognee-graph     = { path = "../graph", features = ["testing", "ladybug"] }
cognee-vector    = { path = "../vector", features = ["testing", "qdrant"] }
cognee-models    = { path = "../models" }
cognee-storage   = { path = "../storage" }
cognee-ingestion = { path = "../ingestion" }
cognee-cognify   = { path = "../cognify" }
cognee-ontology  = { path = "../ontology" }
cognee-delete    = { path = "../delete" }
cognee-llm       = { path = "../llm" }
cognee-session   = { path = "../session", features = ["fs"] }
dotenv.workspace = true
serial_test.workspace = true
tempfile.workspace = true
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
