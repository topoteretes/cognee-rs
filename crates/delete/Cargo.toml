[package]
name = "cognee-delete"
version.workspace = true
edition.workspace = true

[dependencies]
cognee-database = { path = "../database" }
cognee-graph = { path = "../graph" }
cognee-models = { path = "../models" }
cognee-session = { path = "../session" }
cognee-storage = { path = "../storage" }
cognee-vector = { path = "../vector" }
serde.workspace = true
serde_json.workspace = true
thiserror.workspace = true
tracing.workspace = true
uuid.workspace = true

[dev-dependencies]
async-trait.workspace = true
chrono.workspace = true
cognee-database = { path = "../database", features = ["sqlite"] }
