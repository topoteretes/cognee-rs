[package]
name = "cognee-llm"
version.workspace = true
edition.workspace = true
license.workspace = true

[features]
default = []
android-litert = ["dep:cognee-litert-lm"]

[dependencies]
# Async runtime
tokio.workspace = true
async-trait.workspace = true

# Serialization
serde.workspace = true
serde_json.workspace = true

# JSON Schema generation
schemars.workspace = true

# Base64 encoding (for vision API image data URIs)
base64.workspace = true

# Error handling
thiserror.workspace = true

# HTTP client (for API-based implementations)
reqwest = { workspace = true, features = ["multipart"] }

tracing.workspace = true

# Shared tracing-key constants
cognee-utils = { path = "../utils" }

# Android local LLM backend (feature-gated)
cognee-litert-lm = { workspace = true, optional = true }

[dev-dependencies]
cognee-test-utils = { path = "../test-utils" }
dotenv.workspace = true
httpmock = "0.8"
tokio = { workspace = true, features = ["rt-multi-thread", "macros"] }
