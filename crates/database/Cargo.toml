[package]
name = "cognee-database"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
description = "Relational metadata store (SQLite/Postgres via SeaORM) for the cognee AI-memory pipeline."
repository.workspace = true
homepage.workspace = true
readme.workspace = true
keywords.workspace = true
categories.workspace = true
authors.workspace = true

[lints]
workspace = true

[features]
sqlite   = ["sea-orm/sqlx-sqlite"]
postgres = ["sea-orm/sqlx-postgres"]

[dependencies]
cognee-models     = { path = "../models", version = "0.1.1" }
cognee-utils      = { path = "../utils", version = "0.1.1" }
async-trait.workspace = true
chrono.workspace  = true
include_dir = "0.7"
sea-orm = { version = "1.1", features = [
    "runtime-tokio-rustls",
    "with-chrono",
    "with-uuid",
    "with-json",
] }
sea-orm-migration = { version = "1.1", features = ["runtime-tokio-rustls"] }
thiserror.workspace = true
tracing.workspace = true
uuid.workspace = true
serde.workspace = true
# `preserve_order` keeps `serde_json::Map` insertion-ordered so entity
# `to_dict()` helpers (e.g. `session_record::Model::to_dict`) can match
# the field ordering of Python's `to_dict()` byte-for-byte.
serde_json = { workspace = true, features = ["preserve_order"] }

[dev-dependencies]
cognee-test-utils = { path = "../test-utils" }
serial_test.workspace = true
tokio.workspace = true
tempfile = "3"
