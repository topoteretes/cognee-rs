[package]
name = "cognee-core"
version.workspace = true
edition.workspace = true

[features]
telemetry = ["cognee-telemetry/telemetry"]
pipeline-run-registry = []

[dependencies]
cognee-database = { path = "../database" }
cognee-graph = { path = "../graph" }
cognee-telemetry = { path = "../telemetry" }
cognee-vector = { path = "../vector" }

async-trait.workspace = true
chrono.workspace = true
futures.workspace = true
rayon.workspace = true
serde_json.workspace = true
thiserror.workspace = true
tokio.workspace = true
tokio-stream.workspace = true
tracing.workspace = true
uuid.workspace = true

[dev-dependencies]
cognee-database = { path = "../database", features = ["sqlite"] }
cognee-graph = { path = "../graph", features = ["testing"] }
cognee-models = { path = "../models" }
cognee-vector = { path = "../vector", features = ["testing"] }
chrono.workspace = true
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
