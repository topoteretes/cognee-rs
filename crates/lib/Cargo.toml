[package]
name = "cognee-lib"
version.workspace = true
edition.workspace = true

[features]
default = [
    "onnx",
    "ladybug",
    "qdrant",
    "sqlite",
    "postgres",
    "hf-tokenizer",
    "tiktoken",
]
onnx           = ["cognee-embedding/onnx"]
ladybug        = ["cognee-graph/ladybug"]
qdrant         = ["cognee-vector/qdrant"]
pgvector       = ["cognee-vector/pgvector", "dep:url"]
pggraph        = ["cognee-graph/postgres"]
sqlite         = ["cognee-database/sqlite"]
postgres       = ["cognee-database/postgres"]
hf-tokenizer   = ["cognee-chunking/hf-tokenizer"]
tiktoken       = ["cognee-chunking/tiktoken"]
android-litert = ["cognee-llm/android-litert"]
testing = [
    "cognee-cognify/testing",
    "cognee-graph/testing",
    "cognee-storage/testing",
    "cognee-vector/testing",
]

[dependencies]
cognee-chunking = { path = "../chunking" }
cognee-cognify = { path = "../cognify" }
cognee-core = { path = "../core" }
cognee-delete = { path = "../delete" }
cognee-database = { path = "../database" }
cognee-embedding = { path = "../embedding" }
cognee-graph = { path = "../graph" }
cognee-ingestion = { path = "../ingestion" }
cognee-llm = { path = "../llm" }
cognee-models = { path = "../models" }
cognee-ontology = { path = "../ontology" }
cognee-search = { path = "../search" }
cognee-storage = { path = "../storage" }
cognee-vector = { path = "../vector" }
async-trait.workspace = true
thiserror.workspace = true
serde.workspace = true
serde_json.workspace = true
tokio.workspace = true
tracing.workspace = true
url = { workspace = true, optional = true }
uuid.workspace = true

[dev-dependencies]
cognee-test-utils = { path = "../test-utils" }
cognee-storage = { path = "../storage", features = ["testing"] }
tokio = { workspace = true, features = ["rt-multi-thread", "macros"] }