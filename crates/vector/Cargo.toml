[package]
name = "cognee-vector"
version.workspace = true
edition.workspace = true

[features]
qdrant   = ["dep:edge", "dep:segment", "dep:shard", "dep:common"]
pgvector = ["dep:sea-orm", "dep:sea-orm-migration"]
testing  = []

[dependencies]
# Async
tokio       = { workspace = true }
async-trait = { workspace = true }

# Qdrant internals (feature-gated)
edge    = { workspace = true, optional = true }
segment = { workspace = true, optional = true }
shard   = { workspace = true, optional = true }
common  = { workspace = true, optional = true }

# PGVector / SeaORM (feature-gated)
sea-orm = { version = "1.1", features = [
    "runtime-tokio-rustls",
    "sqlx-postgres",
    "with-uuid",
    "with-json",
], optional = true }
sea-orm-migration = { version = "1.1", features = [
    "runtime-tokio-rustls",
], optional = true }

# Data structures
uuid = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }

# Error handling
thiserror = { workspace = true }
tracing = { workspace = true }

# Telemetry constants
cognee-utils = { path = "../utils" }

[dev-dependencies]
tempfile.workspace = true
serial_test.workspace = true
cognee-test-utils = { path = "../test-utils" }
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
