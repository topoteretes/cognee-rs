[package]
name = "cognee-vector"
version.workspace = true
edition.workspace = true

[features]
qdrant  = ["dep:edge", "dep:segment", "dep:shard", "dep:common"]
testing = []

[dependencies]
# Async
tokio       = { workspace = true }
async-trait = { workspace = true }

# Qdrant internals (feature-gated)
edge    = { workspace = true, optional = true }
segment = { workspace = true, optional = true }
shard   = { workspace = true, optional = true }
common  = { workspace = true, optional = true }

# Data structures
uuid = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }

# Error handling
thiserror = { workspace = true }
tracing = { workspace = true }

[dev-dependencies]
tempfile.workspace = true
