[package]
name = "cognee-ingestion"
version.workspace = true
edition.workspace = true

[dependencies]
async-trait.workspace = true
cognee-core = { path = "../core" }
cognee-database = { path = "../database" }
cognee-models = { path = "../models" }
cognee-storage = { path = "../storage" }
cognee-utils = { path = "../utils" }
md-5.workspace = true
sha2.workspace = true
uuid.workspace = true
tokio.workspace = true
mime_guess.workspace = true
reqwest.workspace = true
scraper.workspace = true
thiserror.workspace = true
tracing.workspace = true
url.workspace = true
futures-util.workspace = true
pdfium-render = { workspace = true, optional = true }
pdfium-auto = { workspace = true, optional = true }
pdf-extract = { workspace = true, optional = true }

[features]
default = []
pdf-pdfium = ["dep:pdfium-render", "dep:pdfium-auto"]
pdf-pure-rust = ["dep:pdf-extract"]

[dev-dependencies]
cognee-database = { path = "../database" }
cognee-delete = { path = "../delete" }
cognee-storage = { path = "../storage", features = ["testing"] }
cognee-test-utils = { path = "../test-utils" }
tempfile.workspace = true
tokio = { workspace = true, features = ["rt-multi-thread", "macros"] }
