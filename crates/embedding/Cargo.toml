[package]
name = "cognee-embedding"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
description.workspace = true
repository.workspace = true
homepage.workspace = true
readme.workspace = true
keywords.workspace = true
categories.workspace = true
authors.workspace = true

[features]
onnx         = ["dep:ort", "dep:tokenizers"]
# GPU execution providers for ONNX Runtime — not needed in CPU-only / CI builds.
# Enable ort-cuda or ort-tensorrt when building for a machine with NVIDIA hardware.
ort-cuda     = ["ort/cuda"]
ort-tensorrt = ["ort/tensorrt"]

[dependencies]
async-trait = { workspace = true }
cognee-utils = { path = "../utils" }
futures     = { workspace = true }
tokio       = { workspace = true }
serde       = { workspace = true }
serde_json  = { workspace = true }
thiserror   = { workspace = true }
reqwest     = { workspace = true }
tracing     = { workspace = true }
rand        = { workspace = true }
ort         = { workspace = true, optional = true }
tokenizers  = { workspace = true, optional = true }

[dev-dependencies]
serial_test = { workspace = true }
tempfile = { workspace = true }
