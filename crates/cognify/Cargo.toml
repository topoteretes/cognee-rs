[package]
name = "cognee-cognify"
version.workspace = true
edition.workspace = true

[features]
testing = ["cognee-storage/testing"]

[dependencies]
cognee-models = { path = "../models" }
cognee-storage = { path = "../storage" }
cognee-chunking = { path = "../chunking" }
cognee-core = { path = "../core" }
cognee-llm = { path = "../llm" }
cognee-graph = { path = "../graph" }
cognee-utils = { path = "../utils" }
cognee-embedding = { path = "../embedding" }
cognee-vector = { path = "../vector" }
cognee-ontology = { path = "../ontology" }

uuid = { workspace = true, features = ["v4"] }
tokio = { workspace = true, features = ["rt-multi-thread"] }
async-trait.workspace = true
thiserror.workspace = true
serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true
schemars.workspace = true
futures.workspace = true
tracing.workspace = true

[dev-dependencies]
cognee-storage = { path = "../storage", features = ["testing"] }
cognee-graph = { path = "../graph", features = ["testing"] }
cognee-vector = { path = "../vector", features = ["testing"] }
cognee-database = { path = "../database" }
cognee-ingestion = { path = "../ingestion" }
cognee-search = { path = "../search" }
cognee-delete = { path = "../delete" }
tempfile.workspace = true
tokio = { workspace = true, features = ["rt-multi-thread", "macros"] }
