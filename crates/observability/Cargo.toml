[package]
name = "cognee-observability"
version.workspace = true
edition.workspace = true

[features]
default = []

telemetry = [
    "dep:opentelemetry",
    "dep:opentelemetry_sdk",
    "dep:opentelemetry-otlp",
    "dep:opentelemetry-semantic-conventions",
    "dep:tracing-opentelemetry",
    "dep:tonic",
    "dep:http",
]

[dependencies]
thiserror.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true

opentelemetry = { workspace = true, optional = true }
opentelemetry_sdk = { workspace = true, optional = true }
opentelemetry-otlp = { workspace = true, optional = true }
opentelemetry-semantic-conventions = { workspace = true, optional = true }
tracing-opentelemetry = { workspace = true, optional = true }
# Required for building gRPC `MetadataMap` headers when the `telemetry`
# feature is enabled. Pinned to the version `opentelemetry-otlp 0.31`
# uses transitively, so a single tonic 0.14 graph is reused.
tonic = { version = "=0.14", default-features = false, optional = true }
http = { version = "1", optional = true }

[dev-dependencies]
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
