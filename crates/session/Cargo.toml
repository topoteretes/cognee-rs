[package]
name = "cognee-session"
version.workspace = true
edition.workspace = true
license.workspace = true

[features]
default = []
redis = ["dep:redis"]
fs = []
sea-orm-store = ["dep:sea-orm", "dep:sea-orm-migration"]
telemetry = ["cognee-telemetry/telemetry"]

[dependencies]
cognee-llm = { path = "../llm" }
cognee-telemetry = { path = "../telemetry" }
async-trait.workspace = true
chrono.workspace = true
thiserror.workspace = true
tracing.workspace = true
uuid.workspace = true
serde.workspace = true
serde_json.workspace = true
tokio.workspace = true

# sea-orm backend (feature-gated)
sea-orm = { version = "1.1", features = ["sqlx-sqlite", "sqlx-postgres", "runtime-tokio-rustls", "with-chrono"], optional = true }
sea-orm-migration = { version = "1.1", features = ["runtime-tokio-rustls"], optional = true }

# redis backend (feature-gated)
redis = { version = "0.29", features = ["aio", "tokio-comp", "connection-manager"], optional = true }

[dev-dependencies]
tokio.workspace = true
tempfile.workspace = true
