[package]
name = "cognee-cli"
version.workspace = true
edition.workspace = true
publish = false

[[bin]]
name = "cognee-cli"
path = "src/main.rs"

[features]
default      = ["onnx", "ladybug", "qdrant", "pgvector", "pggraph", "sqlite", "postgres", "hf-tokenizer", "tiktoken"]
onnx         = ["cognee-lib/onnx"]
ladybug      = ["cognee-lib/ladybug"]
qdrant       = ["cognee-lib/qdrant"]
pgvector     = ["cognee-lib/pgvector"]
pggraph      = ["cognee-lib/pggraph"]
sqlite       = ["cognee-lib/sqlite"]
postgres     = ["cognee-lib/postgres"]
hf-tokenizer = ["cognee-lib/hf-tokenizer"]
tiktoken     = ["cognee-lib/tiktoken"]

[dependencies]
clap = { workspace = true, features = ["derive"] }
cognee-lib = { path = "../lib" }
chrono.workspace = true
dirs.workspace = true
serde.workspace = true
serde_json.workspace = true
thiserror.workspace = true
tokio.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true
uuid.workspace = true

[dev-dependencies]
assert_cmd.workspace = true
predicates.workspace = true
tempfile.workspace = true