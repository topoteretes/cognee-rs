[package]
name = "cognee-cli"
version.workspace = true
edition.workspace = true
publish = false

[[bin]]
name = "cognee-cli"
path = "src/main.rs"

[features]
default = [
    "onnx",
    "ladybug",
    "qdrant",
    "pgvector",
    "pggraph",
    "sqlite",
    "postgres",
    "hf-tokenizer",
    "tiktoken",
    "pdf-pdfium",
    "csv-loader",
    "unstructured",
    "visualization",
]
onnx          = ["cognee-lib/onnx"]
ladybug       = ["cognee-lib/ladybug"]
qdrant        = ["cognee-lib/qdrant"]
pgvector      = ["cognee-lib/pgvector"]
pggraph       = ["cognee-lib/pggraph"]
sqlite        = ["cognee-lib/sqlite"]
postgres      = ["cognee-lib/postgres"]
hf-tokenizer  = ["cognee-lib/hf-tokenizer"]
tiktoken      = ["cognee-lib/tiktoken"]
visualization = ["cognee-lib/visualization"]

# Document format loaders (forwarded through cognee-lib)
pdf-pdfium        = ["cognee-lib/pdf-pdfium"]
pdf-pure-rust     = ["cognee-lib/pdf-pure-rust"]
csv-loader        = ["cognee-lib/csv-loader"]
unstructured      = ["cognee-lib/unstructured"]
unstructured-xlsx = ["cognee-lib/unstructured-xlsx"]
unstructured-docx = ["cognee-lib/unstructured-docx"]
unstructured-pptx = ["cognee-lib/unstructured-pptx"]
unstructured-epub = ["cognee-lib/unstructured-epub"]
unstructured-eml  = ["cognee-lib/unstructured-eml"]
unstructured-odt  = ["cognee-lib/unstructured-odt"]
unstructured-odp  = ["cognee-lib/unstructured-odp"]

# Composite feature for Android CLI builds
android-default = ["cognee-lib/android-default"]

[dependencies]
clap = { workspace = true, features = ["derive"] }
dotenv.workspace = true
cognee-lib = { path = "../lib" }
chrono.workspace = true
dirs.workspace = true
serde.workspace = true
serde_json.workspace = true
thiserror.workspace = true
tokio.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true
uuid.workspace = true

[dev-dependencies]
assert_cmd.workspace = true
predicates.workspace = true
tempfile.workspace = true