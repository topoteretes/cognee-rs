[package]
name = "cognee-http-server"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
description.workspace = true
repository.workspace = true
homepage.workspace = true
readme.workspace = true
keywords.workspace = true
categories.workspace = true
authors.workspace = true

[lints]
workspace = true

[lib]
name = "cognee_http_server"
path = "src/lib.rs"

[[bin]]
name = "cognee-http-server"
path = "src/main.rs"
required-features = ["bin"]

[features]
# decision 1: telemetry is ON by default in cognee-http-server. Disable with
# --no-default-features for compile-time opt-out.
# html-loader is on by default so the server binary supports URL ingestion and
# HTML documents out of the box (parity with the Python `/add` URL path).
default = ["telemetry", "html-loader"]
# Enables the standalone-binary entry point and its arg-parsing deps.
bin = [
    "dep:clap",
    "dep:dotenv",
    "tokio/macros",
    "tokio/rt-multi-thread",
    "tokio/signal",
]
# Gates URL ingestion + the HTML document loader (propagates to the ingestion
# and cognify crates). Without it, `DataInput::Url` returns
# UnsupportedDocumentType / UrlIngestionUnavailable at runtime.
html-loader = [
    "cognee-ingestion/html-loader",
    "cognee-cognify/html-loader",
]
telemetry = [
    "dep:cognee-observability",
    "dep:cognee-telemetry",
    "cognee-observability/telemetry",
    "cognee-core/telemetry",
    "cognee-telemetry/telemetry",
    "cognee-search/telemetry",
    "cognee-session/telemetry",
]
# OSS-only dev/test escape hatch: enables a `vector_provider="mock"` wiring
# that constructs an in-memory `MockVectorDB`. Lets `cargo run` / `cargo test`
# work without provisioning a Postgres instance. Off by default — production
# builds drop `cognee-test-utils` entirely. The "qdrant" provider was removed
# from this wiring as part of the OSS/closed split; qdrant lives in the
# closed `cognee-vector-qdrant` crate.
dev-mock = ["dep:cognee-test-utils"]

[dependencies]
# Web framework and HTTP stack — do NOT use workspace hyper; the workspace
# [patch.crates-io] pins hyper to a v0.14 qdrant fork. axum 0.8 requires
# hyper 1.x. Cargo resolves both versions in parallel.
axum = { version = "0.8", features = ["multipart", "ws"] }
tower = "0.5"
tower-http = { version = "0.6", features = ["cors", "trace", "limit"] }
hyper = { version = "1", features = ["server", "http1", "http2"] }

# cognee crates
# NOTE: cognee-lib is intentionally NOT a direct dep here — adding it would
# create a cycle when cognee-lib's `server` feature pulls in cognee-http-server.
# Concrete cognee-lib types are wired via AppState in P1+.
cognee-models = { path = "../models" }
cognee-observability = { path = "../observability", optional = true }
# Product-analytics client. Gated by the `telemetry` feature so a
# `--no-default-features` build drops the dep entirely; the `emit` helper
# in `telemetry.rs` compiles to a noop when absent.
cognee-telemetry = { path = "../telemetry", optional = true, features = ["telemetry"] }
cognee-core = { path = "../core", features = ["pipeline-run-registry"] }
cognee-database = { path = "../database", features = ["sqlite"] }
sea-orm = { version = "1", default-features = false, features = ["runtime-tokio-rustls", "with-chrono", "with-uuid", "with-json"] }
cognee-storage = { path = "../storage" }
cognee-ingestion = { path = "../ingestion" }
cognee-cognify = { path = "../cognify" }
cognee-embedding = { path = "../embedding", features = ["onnx"] }
cognee-delete = { path = "../delete" }
cognee-ontology = { path = "../ontology" }
cognee-search = { path = "../search" }
cognee-session = { path = "../session" }
cognee-llm = { path = "../llm" }
cognee-graph = { path = "../graph", features = ["ladybug"] }
cognee-vector = { path = "../vector", features = ["pgvector"] }
# Optional: pulled in only by the `dev-mock` feature so MockVectorDB stays out
# of production builds. See the feature comment above.
cognee-test-utils = { path = "../test-utils", optional = true }
cognee-logging = { path = "../logging" }
cognee-visualization = { path = "../visualization" }
cognee-utils = { path = "../utils" }

# Serialization
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
serde_urlencoded = "0.7"
serde_path_to_error = "0.1"
form_urlencoded = "1"

# OpenAPI
utoipa = { version = "5", features = ["axum_extras", "uuid", "chrono"] }

# Secret-handling for API-key fields in `HttpServerConfig` /
# `wire_default_backends` (LLM + embedding providers). The JWT / cookie /
# password / SMTP auth deps moved to the closed `cognee-http-cloud`
# crate alongside the auth router family (T3-pre).
secrecy = "0.10"

# Hashing
sha2 = { workspace = true }
rand = { workspace = true }

# Utilities
uuid = { workspace = true, features = ["v4", "v5", "serde"] }
chrono = { workspace = true, features = ["serde"] }
thiserror = { workspace = true }
anyhow = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true, features = ["registry", "std"] }
async-trait = { workspace = true }
dashmap = "6"
bytes = "1"
futures = { workspace = true }
tokio = { workspace = true, features = ["rt", "sync", "time", "net", "io-util", "fs", "process"] }
tokio-util = { version = "0.7", features = ["io"] }
mime_guess = "2"

# Binary-only deps (optional; pulled in by the `bin` feature only)
clap = { workspace = true, features = ["derive", "env"], optional = true }
dotenv = { workspace = true, optional = true }

# Unix-only: setrlimit() for the notebook subprocess runner's memory/CPU
# caps. Falls back to wall-clock-timeout-only on non-Unix.
[target.'cfg(unix)'.dependencies]
libc = "0.2"

[dev-dependencies]
tower = { version = "0.5", features = ["util"] }
tokio = { workspace = true, features = ["rt", "rt-multi-thread", "macros"] }
serde_json = { workspace = true }
serial_test = { workspace = true }
chrono = { workspace = true }
sea-orm = { version = "1", default-features = false, features = ["sqlx-sqlite", "runtime-tokio-native-tls", "macros"] }
cognee-database = { path = "../database", features = ["sqlite"] }
cognee-graph = { path = "../graph", features = ["testing", "ladybug"] }
cognee-vector = { path = "../vector", features = ["testing"] }
cognee-embedding = { path = "../embedding", features = ["onnx"] }
cognee-session = { path = "../session", features = ["fs"] }
dotenv = { workspace = true }
async-trait = { workspace = true }
tempfile = { workspace = true }
cognee-test-utils = { path = "../test-utils" }
