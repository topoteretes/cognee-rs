[package]
name = "cognee-http-server"
version.workspace = true
edition.workspace = true

[lib]
name = "cognee_http_server"
path = "src/lib.rs"

[[bin]]
name = "cognee-http-server"
path = "src/main.rs"
required-features = ["bin"]

[features]
default = []
# Enables the standalone-binary entry point and its arg-parsing deps.
bin = [
    "dep:clap",
    "dep:dotenv",
    "tokio/macros",
    "tokio/rt-multi-thread",
    "tokio/signal",
]

[dependencies]
# Web framework and HTTP stack — do NOT use workspace hyper; the workspace
# [patch.crates-io] pins hyper to a v0.14 qdrant fork. axum 0.8 requires
# hyper 1.x. Cargo resolves both versions in parallel.
axum = { version = "0.8", features = ["multipart", "ws"] }
tower = "0.5"
tower-http = { version = "0.6", features = ["cors", "trace", "limit"] }
hyper = { version = "1", features = ["server", "http1", "http2"] }

# cognee crates
# NOTE: cognee-lib is intentionally NOT a direct dep here — adding it would
# create a cycle when cognee-lib's `server` feature pulls in cognee-http-server.
# Concrete cognee-lib types are wired via AppState in P1+.
cognee-models = { path = "../models" }
cognee-core = { path = "../core", features = ["pipeline-run-registry"] }
cognee-database = { path = "../database", features = ["sqlite"] }
sea-orm = { version = "1", default-features = false, features = ["runtime-tokio-rustls", "with-chrono", "with-uuid", "with-json"] }
cognee-storage = { path = "../storage" }
cognee-ingestion = { path = "../ingestion" }
cognee-delete = { path = "../delete" }
cognee-ontology = { path = "../ontology" }
cognee-search = { path = "../search" }
cognee-session = { path = "../session" }
cognee-llm = { path = "../llm" }
cognee-graph = { path = "../graph" }
cognee-visualization = { path = "../visualization" }
cognee-cloud = { path = "../cloud" }
cognee-utils = { path = "../utils" }

# Serialization
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
serde_urlencoded = "0.7"
serde_path_to_error = "0.1"
form_urlencoded = "1"

# OpenAPI
utoipa = { version = "5", features = ["axum_extras", "uuid", "chrono"] }

# SMTP mailer (lettre — pure Rust TLS, no OpenSSL dep)
lettre = { version = "0.11", default-features = false, features = ["tokio1-rustls-tls", "smtp-transport", "builder"] }

# Auth
jsonwebtoken = "9"
argon2 = "0.5"
bcrypt = "0.16"
cookie = { version = "0.18", features = ["percent-encode"] }
secrecy = "0.10"
email_address = "0.2"

# Hashing
sha2 = { workspace = true }
rand = { workspace = true }

# Utilities
uuid = { workspace = true, features = ["v4", "v5", "serde"] }
chrono = { workspace = true, features = ["serde"] }
thiserror = { workspace = true }
anyhow = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true, features = ["registry", "std"] }
regex = "1"
async-trait = { workspace = true }
dashmap = "6"
bytes = "1"
futures = { workspace = true }
tokio = { workspace = true, features = ["rt", "sync", "time", "net", "io-util", "fs"] }
tokio-stream = { workspace = true }
tokio-util = { version = "0.7", features = ["io"] }
mime_guess = "2"

# Binary-only deps (optional; pulled in by the `bin` feature only)
clap = { workspace = true, features = ["derive", "env"], optional = true }
dotenv = { workspace = true, optional = true }

[dev-dependencies]
tower = { version = "0.5", features = ["util"] }
tokio = { workspace = true, features = ["rt", "rt-multi-thread", "macros"] }
serde_json = { workspace = true }
http-body-util = "0.1"
serial_test = { workspace = true }
chrono = { workspace = true }
sea-orm = { version = "1", default-features = false, features = ["sqlx-sqlite", "runtime-tokio-native-tls", "macros"] }
cognee-database = { path = "../database", features = ["sqlite"] }
cognee-graph = { path = "../graph", features = ["testing"] }
cognee-session = { path = "../session", features = ["fs"] }
async-trait = { workspace = true }
tempfile = { workspace = true }
