# release-plz configuration for cognee-rust (OSS workspace).
#
# Docs: https://release-plz.dev/docs/config
#
# This config is consumed by the release-plz GitHub Action.
# It is intentionally minimal: every publishable workspace member shares the
# same policy. Per-crate overrides live in `[[package]]` blocks below if and
# when we need to diverge.
#
# Crates with `publish = false` in their `Cargo.toml` (cognee-cli,
# cognee-bindings-common plus the cognee-test-utils / cognee-examples /
# cognee-http-server / python / bench harnesses) are skipped automatically by
# release-plz, so we do not list them here.
#
# Publish ordering: release-plz walks the workspace dependency graph and
# publishes deps before dependents. The exact same ordering is emitted by
# `scripts/split/publish-order.sh`, which the T10c local sweep and the T13
# CI publish-dry-run job consume.

[workspace]
# Walk the workspace dependency graph when publishing so a release PR that
# bumps cognee-core also re-publishes cognee-lib etc. in the right order.
dependencies_update = true

# Push the produced packages to crates.io. (Set false to make release-plz
# only open the release PR without publishing — useful for dry-run setups.)
publish = true

# Disable cargo-semver-checks. To detect API breaks it builds rustdoc for every
# crate against its published baseline, which compiles the full native stack
# (lbug's bundled C++ via cmake, ONNX runtime, protobuf) twice with no cache —
# that made the `release-pr` job hang for 40-65+ min and stall the workflow
# (see git history / the post-0.1.0 release-plz incident). It adds little value
# pre-1.0 (any change can be breaking), so we skip it. Re-enable per-crate once
# the API stabilizes and the heavy build is cached.
semver_check = false

# Single, top-level CHANGELOG.md. release-plz appends a section per release.
# Switch to per-crate changelogs (`changelog_path` inside a `[[package]]`
# block) only if a crate's history starts to drown out the others.
changelog_path = "CHANGELOG.md"

# Generate the GitHub Release entry from the changelog section release-plz
# just wrote — keeps the GitHub UI and CHANGELOG.md in sync.
git_release_enable = true

# Conventional-commit-flavoured changelog body. Defaults are fine; documented
# here so future maintainers know where the knobs live.
# See: https://release-plz.dev/docs/config#the-changelog-section

# Per-crate overrides go here. Today every publishable cognee-* crate uses
# the workspace defaults above, so this section is intentionally empty.
# Example (commented):
#
# [[package]]
# name = "cognee-lib"
# changelog_include = ["cognee-core", "cognee-search"]
