[package]
name = "cognee-rust"
version = "0.1.0"
edition = "2024"

[dependencies]
serde = { version = "1", features = ["derive"] }
uuid  = { version = "1", features = ["v4", "serde"] }
serde_json = "1"
chrono = { version = "0.4.41", features = ["serde"] }

[dev-dependencies]
tokio = { version = "1", features = ["rt-multi-thread", "macros", "sync", "time"] }
anyhow = "1"
rand = "0.8"

