[package]
name = "cognee-rust"
version = "0.1.0"
edition = "2024"

[dependencies]
serde = { version = "1", features = ["derive"] }
uuid  = { version = "1", features = ["v4", "serde"] }
serde_json = "1"
chrono = { version = "0.4.41", features = ["serde"] }
log = "0.4"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "sync", "time", "fs"] }
rand = "0.8"

[dev-dependencies]
tokio = { version = "1", features = ["rt-multi-thread", "macros", "sync", "time", "fs"] }
anyhow = "1"
rand = "0.8"
env_logger = "0.11"
dotenv = "0.15"
notify = "6.1"

