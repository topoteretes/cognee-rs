[workspace]
members = [
    "examples",
    "crates/cognee-models",
    "crates/cognee-storage",
    "crates/cognee-database",
    "crates/cognee-ingestion",
    "crates/cognee-chunking",
    "crates/cognee-cognify",
    "crates/cognee-utils",
    "crates/cognee-llm",
    "crates/cognee-graph",
    "crates/cognee-embedding",
]
resolver = "3"

[workspace.package]
edition = "2024"

[workspace.dependencies]
anyhow = "1"
async-trait = "0.1.89"
chrono = { version = "0.4.41", features = ["serde"] }
common = { git = "https://github.com/qdrant/qdrant", package = "common", branch = "dev" }
dotenv = "0.15"
edge = { git = "https://github.com/qdrant/qdrant", package = "edge", default-features = false, branch = "dev" }
env_logger = "0.11"
futures-util = "0.3"
lbug = "0.14"
log = "0.4"
ndarray = "0.17"
notify = "6.1"
ort = { version = "2.0.0-rc.11", features = ["ndarray", "cuda", "tensorrt"] }
rand = "0.8"
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls", "cookies", "gzip", "json"] }
scraper = "0.21"
segment = { git = "https://github.com/qdrant/qdrant", package = "segment", default-features = false, branch = "dev" }
serde = { version = "1", features = ["derive"] }
serial_test = "3.2"
thiserror = "2.0"
serde_json = "1"
shard = { git = "https://github.com/qdrant/qdrant", package = "shard", branch = "dev" }
tempfile = "3"
tokenizers = "0.21"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "sync", "time", "fs", "io-util"] }
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }
url = "2.5"
uuid = { version = "1", features = ["v4", "v5", "serde"] }

[patch.crates-io]
# Align tar version with qdrant workspace (needed for Archive::set_sync)
tar = { git = "https://github.com/qdrant/tar-rs", branch = "main" }

[profile.release]
debug = true
