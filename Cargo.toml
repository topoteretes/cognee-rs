[workspace]
members = [
    "examples",
    "crates/models",
    "crates/storage",
    "crates/database",
    "crates/ingestion",
    "crates/chunking",
    "crates/cognify",
    "crates/lib",
    "crates/cli",
    "crates/utils",
    "crates/llm",
    "crates/graph",
    "crates/embedding",
    "crates/vector",
    "crates/ontology",
    "crates/search",
    "crates/delete",
]
resolver = "3"

[workspace.package]
edition = "2024"
version = "0.1.0"

[workspace.dependencies]
anyhow = "1"
assert_cmd = "2.0"
async-trait = "0.1.89"
clap = "4.5"
chrono = { version = "0.4.41", default-features = false, features = ["serde", "clock", "std"] }
common = { git = "https://github.com/qdrant/qdrant", package = "common", branch = "dev" }
dirs = "6"
dotenv = "0.15"
edge = { git = "https://github.com/qdrant/qdrant", package = "edge", default-features = false, branch = "dev" }
env_logger = "0.11"
futures = "0.3"
futures-util = "0.3"
lbug = "0.14"
log = "0.4"
mime_guess = "2.0"
ndarray = "0.17"
notify = "6.1"
ort = { version = "2.0.0-rc.11", features = ["ndarray", "cuda", "tensorrt"] }
predicates = "3.1"
rand = "0.8"
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls", "cookies", "gzip", "json"] }
scraper = "0.21"
schemars = "0.8"
segment = { git = "https://github.com/qdrant/qdrant", package = "segment", default-features = false, branch = "dev" }
serde = { version = "1", features = ["derive"] }
serial_test = "3.2"
sha2 = "0.10"
sophia = "0.8"
sophia_api = "0.8"
sophia_inmem = "0.8"
sophia_jsonld = "0.8"
sophia_turtle = "0.8"
sophia_xml = "0.8"
sqlx = "0.8"
strsim = "0.11"
thiserror = "2.0"
serde_json = "1"
shard = { git = "https://github.com/qdrant/qdrant", package = "shard", branch = "dev" }
tempfile = "3"
tokenizers = "0.21"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "sync", "time", "fs", "io-util"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }
url = "2.5"
uuid = { version = "1", features = ["v4", "v5", "serde"] }

[patch.crates-io]
# Align tar version with qdrant workspace (needed for Archive::set_sync)
tar = { git = "https://github.com/qdrant/tar-rs", branch = "main" }

[profile.release]
debug = true
