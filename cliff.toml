# git-cliff configuration for cognee-rust.
#
# Replaces release-plz's built-in changelog generation. The release-open
# workflow (.github/workflows/release-open.yml) runs:
#
#   git-cliff --unreleased --tag vX.Y.Z --strip all
#
# to render ONLY the new version's section (header/footer stripped), then inserts
# it into CHANGELOG.md right after the `## [Unreleased]` marker and reuses the
# same text as the GitHub Release notes. Output matches the existing
# Keep a Changelog layout: `## [X.Y.Z](compare-link) - YYYY-MM-DD` + grouped
# `### <Section>` bullet lists.
#
# Docs: https://git-cliff.org/docs/configuration

[changelog]
header = """
# Changelog

All notable changes to this project are documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.1.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).
"""

# One version section. `version`/`previous.version` are the git tag names
# (vX.Y.Z); the heading shows the bare number and links to the tag-to-tag diff.
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}]\
{% if previous and previous.version %}(https://github.com/topoteretes/cognee-rs/compare/{{ previous.version }}...{{ version }}){% endif %} - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {{ commit.message | split(pat="\n") | first | upper_first | trim }}\
{% endfor %}
{% endfor %}
"""

footer = ""
trim = true

[git]
conventional_commits = true
# Keep non-conventional commits too (routed to "Other" by the catch-all parser)
# so nothing silently vanishes from the log.
filter_unconventional = false
filter_commits = false
split_commits = false
protect_breaking_commits = false
tag_pattern = "v[0-9]*.[0-9]*.[0-9]*"
topo_order = false
sort_commits = "newest"

# Conventional-commit prefix -> changelog section. First match wins; the final
# catch-all keeps everything else under "Other".
commit_parsers = [
  { message = "^Merge ",          skip = true },
  { message = "^chore: release",  skip = true },
  { message = "^chore\\(release\\)", skip = true },
  { message = "^feat",            group = "Added" },
  { message = "^fix",             group = "Fixed" },
  { message = "^perf",            group = "Changed" },
  { message = "^refactor",        group = "Changed" },
  { message = "^doc",             group = "Documentation" },
  { message = "^spike",           group = "Other" },
  { message = "^ci",              group = "Other" },
  { message = "^build",           group = "Other" },
  { message = "^chore",           group = "Other" },
  { message = "^test",            skip = true },
  { message = ".*",               group = "Other" },
]
