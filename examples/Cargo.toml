[package]
name = "cognee-examples"
version = "0.1.0"
edition.workspace = true
build = "build.rs"
publish = false

# Define each example
[[example]]
name = "add_example"
path = "add_example.rs"

[[example]]
name = "embeddings"
path = "embeddings.rs"

[[example]]
name = "ladybug"
path = "ladybug.rs"

[[example]]
name = "llm_fact_extraction"
path = "llm_fact_extraction.rs"

[[example]]
name = "qdrant"
path = "qdrant.rs"

[[example]]
name = "simple_example"
path = "simple_example.rs"

[features]
default = []
# Enable this feature to build libonnxruntime from source as a dynamic library.
# Automatically enabled for Android targets (which get NNAPI support).
onnx_dynamic_library = ["ort/load-dynamic"]
testing = ["dep:tempfile"]

[dependencies]
# Workspace crates (instead of duplicates)
cognee-storage = { path = "../crates/cognee-storage" }
cognee-database = { path = "../crates/cognee-database" }
cognee-ingestion = { path = "../crates/cognee-ingestion" }
cognee-models = { path = "../crates/cognee-models" }

# Keep existing dependencies that examples need
async-trait.workspace = true
chrono.workspace = true
common.workspace = true
edge.workspace = true
lbug.workspace = true
log.workspace = true
ndarray.workspace = true
ort.workspace = true
rand.workspace = true
segment.workspace = true
serde.workspace = true
serde_json.workspace = true
shard.workspace = true
thiserror.workspace = true
tokenizers.workspace = true
tokio.workspace = true
tracing-subscriber.workspace = true
uuid.workspace = true

# Dependencies from merged crates
sha2 = "0.10"
mime_guess = "2.0"
sqlx = { version = "0.8", features = ["runtime-tokio", "sqlite", "uuid", "chrono"] }
tempfile = { workspace = true, optional = true }

# Enable load-dynamic for Android targets automatically (for NNAPI support)
[target.'cfg(target_os = "android")'.dependencies]
ort = { version = "2.0.0-rc.11", features = ["load-dynamic"] }

[dev-dependencies]
anyhow.workspace = true
dotenv.workspace = true
env_logger.workspace = true
notify.workspace = true
rand.workspace = true
tempfile.workspace = true
tokio.workspace = true
