[package]
name = "cognee-telemetry-emit"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
publish = false
description = "Harness-only binary that drives cognee_lib::telemetry::send_telemetry once with fixed args. Used by the e2e-cross-sdk telemetry parity tests. Not part of the production CLI."
repository.workspace = true
homepage.workspace = true
readme.workspace = true
keywords.workspace = true
categories.workspace = true
authors.workspace = true

[lints]
workspace = true

[[bin]]
name = "cognee-telemetry-emit"
# Source lives under e2e-cross-sdk/bin/ alongside the harness shell scripts
# (telemetry_proxy.py, start_servers.sh) so all harness helpers live in one
# directory. The Cargo manifest stays in this sibling crate dir to keep it
# out of the production crates/ tree.
path = "../bin/telemetry_emit.rs"

[dependencies]
# The harness binary only needs `telemetry`, but cognee-lib's
# component_manager has feature-gated arms that leave the `dim` local
# unused under the bare `telemetry` feature combination — the lint
# fires only when none of `qdrant` / `pgvector` are enabled. Enable
# `qdrant` here purely to keep clippy quiet; it has no effect on
# send_telemetry behaviour because the harness binary never touches
# the component manager.
cognee-lib = { path = "../../crates/lib", default-features = false, features = ["telemetry", "qdrant"] }
serde_json = { workspace = true }
tokio = { workspace = true, features = ["rt-multi-thread", "macros"] }
