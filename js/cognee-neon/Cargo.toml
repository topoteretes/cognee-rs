[package]
name = "cognee-neon"
version = "0.1.0"
edition = "2024"

# Standalone crate — not part of the parent workspace.
[workspace]

[lib]
crate-type = ["cdylib"]

[dependencies]
# Full cognee SDK. Phase 0 links this to prove the foundation compiles and
# produces a loadable `.node`; later phases expose the SDK functions.
#
# Feature set: the engine features the SDK needs (qdrant, ladybug, onnx,
# hf-tokenizer, tiktoken) plus `sqlite` (used by the legacy `task_context.rs`
# mock, which connects to `sqlite::memory:`) and `testing` (re-exports the
# mock graph/vector backends through `cognee_lib`, and keeps the legacy mock
# `TaskContext` working). Heavier loaders (pdf-pdfium, unstructured) and the
# `telemetry`/`cloud`/`visualization` flags are deferred to later phases.
cognee-lib = { path = "../../crates/lib", default-features = false, features = [
    "qdrant",
    "ladybug",
    "onnx",
    "hf-tokenizer",
    "tiktoken",
    "sqlite",
    "testing",
] }
# Kept as direct deps so the legacy engine modules (task_context.rs etc.) keep
# their existing crate-path imports without a rewire. These are path deps, so
# they resolve to the same versions `cognee-lib` pulls in.
cognee-core = { path = "../../crates/core" }
cognee-database = { path = "../../crates/database", features = ["sqlite"] }
cognee-graph = { path = "../../crates/graph", features = ["testing"] }
cognee-vector = { path = "../../crates/vector", features = ["testing"] }
cognee-logging = { path = "../../crates/logging" }
# Bridge Rust `tracing` events to stderr for Node hosts (gap 07
# decision 1 / Option A). Pinned to the version `cognee-logging`
# consumes transitively.
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }

# Optional opentelemetry / send_telemetry surfaces. Feature enabled
# by default per gap 07 decision 3.
cognee-observability = { path = "../../crates/observability", features = ["telemetry"] }
cognee-telemetry     = { path = "../../crates/telemetry",     features = ["telemetry"] }
neon = { version = "1", default-features = false, features = ["napi-6"] }
async-trait = "0.1.89"
tokio = { version = "1", features = ["rt-multi-thread", "sync", "time"] }
futures = "0.3"
uuid = { version = "1.21", features = ["v4", "serde"] }

[patch.crates-io]
tar = { git = "https://github.com/qdrant/tar-rs", branch = "main" }
tonic = { git = "https://github.com/qdrant/tonic", branch = "v0.11.0-qdrant" }
hyper = { git = "https://github.com/qdrant/hyper", branch = "v0.14.26-qdrant" }
