name: HTTP Parity

# TODO(http-parity): re-enable push/pull_request triggers once cognee Python's
# `fix/db-migrations` branch merges to dev. Today the Python alembic chain
# fails on a virgin SQLite DB because its initial migration
# (cognee/alembic/versions/8057ae7329c2_initial_migration.py) is a no-op and
# subsequent revisions like ab7e313804ae_permission_system_rework assume the
# `acls` table already exists. The harness's tmpfs `/py` workspace is a true
# virgin DB on every run, so Python uvicorn never reaches a healthy /health
# state, wait_for_health.sh times out, and Phase-1 fails before pytest runs.
# The upstream fix is on `origin/fix/db-migrations` (commit 8ab385033) which
# replaces the no-op initial migration with a comprehensive
# deadbeef0001_new_initial_schema.py covering every base table (~30
# create_table calls including `acls`). When that lands on dev:
#   1. Bump the cognee `ref:` SHA in the Checkout step below.
#   2. Restore the on.push / on.pull_request triggers (see git history).
# Until then the workflow only runs on workflow_dispatch.
on:
  workflow_dispatch:
    inputs:
      run_phase3:
        description: "Run phase-3 specialty tests (websocket, sync, permissions, visualize)"
        required: false
        default: "false"
        type: boolean

concurrency:
  group: http-parity-${{ github.ref }}
  cancel-in-progress: true

jobs:
  http-parity:
    runs-on: ubuntu-latest

    steps:
      # The Dockerfile copies from BOTH cognee-rust/ and cognee/ siblings
      # (multi-stage build: Rust binaries from this repo + Python venv from
      # the cognee Python repo), and docker-compose.yml uses `context: ../..`.
      # We replicate the local monorepo layout (`~/dev/cognee/{cognee-rust,cognee}`)
      # by checking both repos out as siblings under $GITHUB_WORKSPACE.
      - name: Checkout cognee-rust
        uses: actions/checkout@v4
        with:
          path: cognee-rust
          submodules: recursive

      # Pinned to a `dev`-branch SHA that ships the Ladybug shim (kuzu/ has
      # been re-exported from `ladybug` since 1.0.5). On `main` kuzu is still
      # a hard pip dep that's not installed in the harness venv, causing
      # `ModuleNotFoundError: No module named 'kuzu'` during alembic migrations.
      # Bump this SHA periodically; pinning beats `ref: dev` so upstream
      # churn can't silently break our CI.
      - name: Checkout cognee (Python sibling repo)
        uses: actions/checkout@v4
        with:
          repository: topoteretes/cognee
          ref: b9014c1661bff1d1d8bc831f3d31bc5a965bcaa3
          path: cognee

      # docker-compose.yml declares `env_file: ../.env`; missing files abort
      # `docker compose run`, so create an empty stub. Real env vars are
      # passed through process env in each phase.
      - name: Stub cognee-rust/.env (required by docker-compose env_file)
        run: touch cognee-rust/.env

      # Cargo.lock is gitignored (workspace policy: see .gitignore:6) but the
      # rust-builder stage does `COPY cognee-rust/Cargo.lock ./`, so we
      # materialize it on the host before docker build. `generate-lockfile`
      # only resolves the dependency graph; it does not compile anything.
      - name: Generate Cargo.lock (gitignored, required by Dockerfile COPY)
        run: cargo generate-lockfile --manifest-path cognee-rust/Cargo.toml

      # ubuntu-latest ships with ~14 GB free; lbug's C++ link step needs more
      # headroom than that once cargo registry, target cache, and Docker
      # layers are factored in. Mirror ci.yml's Test job cleanup.
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          swap-storage: true
          docker-images: true

      # ── Docker layer cache ────────────────────────────────────────────────
      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: >-
            buildx-http-parity-${{
              hashFiles(
                'cognee-rust/e2e-cross-sdk/Dockerfile',
                'cognee-rust/Cargo.lock'
              )
            }}
          restore-keys: |
            buildx-http-parity-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Phase-1: no LLM required ──────────────────────────────────────────
      - name: Phase-1 — health, auth, datasets, add, search, forget, openapi, errors
        run: >-
          docker compose
          -f cognee-rust/e2e-cross-sdk/docker-compose.yml
          run --rm e2e-http-tests
          pytest -vs /harness/
          -k "test_http_(health|auth|datasets|add|search|forget|openapi|errors|self)"
          --tb=short

      # ── Telemetry parity: cross-SDK identity-layer comparison ────────────
      # Asserts api_key_tracking_id and persistent_id parity between the
      # Python and Rust SDKs. Uses the local `telemetry-proxy` service
      # (mock for test.prometh.ai) declared in docker-compose.yml — no
      # OPENAI_KEY required, no live network egress. The `e2e-telemetry`
      # service runs `pytest -vs /harness/test_telemetry_parity.py` against
      # both the Rust `cognee-telemetry-emit` binary and the Python SDK,
      # then diffs the captured payloads.
      - name: Telemetry parity (cross-SDK identity layers)
        run: >-
          docker compose
          -f cognee-rust/e2e-cross-sdk/docker-compose.yml
          run --rm e2e-telemetry

      # ── Phase-2: LLM-gated (requires OPENAI_KEY secret) ──────────────────
      # The `secrets` context is not available in step-level `if:` expressions,
      # so we route the secret through `env.HAS_OPENAI_KEY` and gate on that.
      - name: Phase-2 — cognify, remember, recall, memify, improve, llm (LLM-gated)
        if: ${{ env.HAS_OPENAI_KEY == 'true' }}
        env:
          HAS_OPENAI_KEY: ${{ secrets.OPENAI_KEY != '' }}
          OPENAI_TOKEN: ${{ secrets.OPENAI_KEY }}
          OPENAI_URL: https://api.openai.com/v1
          OPENAI_MODEL: gpt-4o-mini
        run: >-
          docker compose
          -f cognee-rust/e2e-cross-sdk/docker-compose.yml
          run --rm e2e-http-tests
          pytest -vs /harness/
          -k "test_http_(cognify|remember|recall|memify|improve|llm)"
          --tb=short

      # ── Cross-SDK provenance parity (LLM-gated) ─────────────────────────
      # Asserts gap-05 DataPoint provenance parity between Python and
      # Rust SDKs (source_pipeline / source_task / source_user). See
      # docs/telemetry/05-datapoint-provenance.md.
      - name: Provenance parity (LLM-gated)
        if: ${{ env.HAS_OPENAI_KEY == 'true' }}
        env:
          HAS_OPENAI_KEY: ${{ secrets.OPENAI_KEY != '' }}
          OPENAI_TOKEN: ${{ secrets.OPENAI_KEY }}
          OPENAI_URL: https://api.openai.com/v1
          OPENAI_MODEL: gpt-4o-mini
        run: >-
          docker compose
          -f cognee-rust/e2e-cross-sdk/docker-compose.yml
          run --rm e2e-tests
          pytest -vs /harness/test_provenance_parity.py
          --tb=short

      # ── Cross-SDK logging parity (no LLM needed) ────────────────────────
      # Asserts gap-06 file-logging parity between Python and Rust SDKs:
      # loose per-filename presence, strict per-message byte equality.
      # See docs/telemetry/06-file-logging-rotation.md. The test itself
      # does not require OpenAI, but the entire workflow is
      # workflow_dispatch-only today (see file header about the alembic
      # migration freeze); we keep the HAS_OPENAI_KEY gate so this step
      # gracefully skips on forks without the secret. When push/PR
      # triggers are restored, the gate continues to work unchanged.
      - name: Logging parity (no LLM needed)
        if: ${{ env.HAS_OPENAI_KEY == 'true' }}
        env:
          HAS_OPENAI_KEY: ${{ secrets.OPENAI_KEY != '' }}
        run: >-
          docker compose
          -f cognee-rust/e2e-cross-sdk/docker-compose.yml
          run --rm e2e-tests
          pytest -vs /harness/test_logging_parity.py
          --tb=short

      # ── Phase-3: specialty (manual via workflow_dispatch only) ────────────
      - name: Phase-3 — websocket, sync, permissions, visualize (manual only)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_phase3 == 'true' }}
        env:
          OPENAI_TOKEN: ${{ secrets.OPENAI_KEY }}
          OPENAI_URL: https://api.openai.com/v1
          OPENAI_MODEL: gpt-4o-mini
        run: >-
          docker compose
          -f cognee-rust/e2e-cross-sdk/docker-compose.yml
          run --rm e2e-http-tests
          pytest -vs /harness/
          -k "test_http_(websocket|sync|permissions|visualize)"
          --tb=short
