name: TS Prebuild

# Build per-platform prebuilt .node binaries and publish per-platform npm
# packages (@cognee-ts/neon-<platform>) on release tags, then publish the main
# `cognee-ts` npm package once all platform packages are live.
#
# The matrix matches the entries in:
#   ts/package.json           (optionalDependencies)
#   ts/src/native.ts          (platforms map)
#   ts/scripts/postinstall.js (PLATFORM_PACKAGES map)
#   ts/platform-packages/     (one sub-directory per platform)
#
# N-API version: napi-6 (Node >= 14.6 / 16.0), matching the neon crate
# configuration in ts/cognee-ts-neon/Cargo.toml (`napi-6` feature).

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  # Manual trigger: build all platforms and publish whichever are missing,
  # without needing a version bump / new tag. The publish steps are
  # idempotent (skip-if-already-on-registry), so re-running is safe.
  workflow_dispatch:

concurrency:
  group: ts-prebuild-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_PROFILE_RELEASE_DEBUG: "0"
  CARGO_INCREMENTAL: "0"
  ORT_CACHE_DIR: ${{ github.workspace }}/target/ort-cache
  CCACHE_COMPILERCHECK: content

jobs:
  # ── Build per-platform .node artifacts ───────────────────────────────
  build-platform:
    name: Build ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x64 glibc — native runner
          - platform: linux-x64-gnu
            runner: ubuntu-latest
            rust-target: x86_64-unknown-linux-gnu
            cross: false

          # Linux arm64 glibc — cross via `cross`
          - platform: linux-arm64-gnu
            runner: ubuntu-latest
            rust-target: aarch64-unknown-linux-gnu
            cross: true

          # macOS x64
          - platform: darwin-x64
            runner: macos-13
            rust-target: x86_64-apple-darwin
            cross: false

          # macOS arm64 (Apple Silicon)
          - platform: darwin-arm64
            runner: macos-14
            rust-target: aarch64-apple-darwin
            cross: false

          # Windows x64
          - platform: win32-x64-msvc
            runner: windows-latest
            rust-target: x86_64-pc-windows-msvc
            cross: false

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      # Install cross for cross-compilation jobs.
      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      # mold linker (Linux only, native builds only).
      - name: Install mold linker
        if: runner.os == 'Linux' && !matrix.cross
        uses: rui314/setup-mold@v1
        with:
          make-default: true

      # cmake + protoc needed by lbug and qdrant on Linux.
      - name: Install native build deps (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y cmake protobuf-compiler

      # cmake + protoc on macOS.
      - name: Install native build deps (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake protobuf

      # cmake + protoc on Windows.
      - name: Install native build deps (Windows)
        if: runner.os == 'Windows'
        run: choco install cmake protoc --no-progress

      - name: ccache (lbug bundled C++, restore-only)
        if: runner.os != 'Windows'
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: lbug-cxx-${{ matrix.platform }}
          max-size: 1G
          save: true

      - name: Cache cargo (Neon workspace)
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ts-neon-${{ matrix.platform }}-v1
          workspaces: ts/cognee-ts-neon -> target
          cache-on-failure: true

      - name: Cache ORT binary
        uses: actions/cache@v4
        with:
          path: ts/cognee-ts-neon/target/ort-cache
          key: ort-v2.0.0-rc.12-cpu-${{ matrix.platform }}
        env:
          # Point ort-sys at the neon workspace's target dir.
          ORT_CACHE_DIR: ${{ github.workspace }}/ts/cognee-ts-neon/target/ort-cache

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install JS dependencies (no scripts to avoid recursive postinstall)
        working-directory: ts
        run: npm install --ignore-scripts

      # Build the Neon cdylib for the target platform.
      - name: Build Neon addon (native)
        if: "!matrix.cross"
        working-directory: ts/cognee-ts-neon
        env:
          ORT_CACHE_DIR: ${{ github.workspace }}/ts/cognee-ts-neon/target/ort-cache
        run: cargo build --release --target ${{ matrix.rust-target }}

      - name: Build Neon addon (cross)
        if: matrix.cross
        working-directory: ts/cognee-ts-neon
        # cognee-ts-neon stays a standalone workspace; ts/cognee-ts-neon/Cross.toml
        # mounts the whole repo (volumes=COGNEE_REPO_ROOT) so its ../../crates
        # path-deps resolve in the container, and selects a gcc-11 image for the
        # arm64 target (lbug needs C++20 / libstdc++ 11). cross mounts the crate
        # target at /target. Disable simsimd's advanced ARM SIMD kernels (SVE /
        # NEON-bf16) the cross toolchain can't assemble.
        env:
          ORT_CACHE_DIR: /target/ort-cache
          COGNEE_REPO_ROOT: ${{ github.workspace }}
        run: |
          SVE="-DSIMSIMD_TARGET_NEON_I8=0 -DSIMSIMD_TARGET_NEON_F16=0 -DSIMSIMD_TARGET_NEON_BF16=0 -DSIMSIMD_TARGET_SVE=0 -DSIMSIMD_TARGET_SVE_I8=0 -DSIMSIMD_TARGET_SVE_F16=0 -DSIMSIMD_TARGET_SVE_BF16=0 -DSIMSIMD_TARGET_SVE2=0"
          TGT_US=$(echo "${{ matrix.rust-target }}" | tr '-' '_')
          export CFLAGS_${TGT_US}="$SVE" CXXFLAGS_${TGT_US}="$SVE"
          cross build --release --target ${{ matrix.rust-target }}

      # Copy the built artifact into the platform package directory.
      - name: Copy artifact (Linux / macOS)
        if: runner.os != 'Windows'
        run: |
          TARGET_DIR="ts/cognee-ts-neon/target/${{ matrix.rust-target }}/release"
          DEST="ts/platform-packages/${{ matrix.platform }}/cognee_ts_neon.node"
          # Prefer .so (Linux), then .dylib (macOS).
          for candidate in \
            "${TARGET_DIR}/libcognee_ts_neon.so" \
            "${TARGET_DIR}/libcognee_ts_neon.dylib"; do
            if [ -f "$candidate" ]; then
              cp "$candidate" "$DEST"
              echo "Copied $candidate -> $DEST"
              break
            fi
          done
          if [ ! -f "$DEST" ]; then
            echo "error: could not find Neon cdylib in $TARGET_DIR" >&2
            exit 1
          fi

      - name: Copy artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $src = "ts/cognee-ts-neon/target/${{ matrix.rust-target }}/release/cognee_ts_neon.dll"
          $dst = "ts/platform-packages/${{ matrix.platform }}/cognee_ts_neon.node"
          Copy-Item $src $dst -Force
          Write-Host "Copied $src -> $dst"

      # Upload the .node file as a workflow artifact so the publish job can
      # download all of them atomically.
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: neon-${{ matrix.platform }}
          path: ts/platform-packages/${{ matrix.platform }}/cognee_ts_neon.node
          retention-days: 7

  # The `secrets` context is NOT available in a job-level `if:` (GitHub rejects
  # the whole workflow file as invalid). Read the token in a step instead and
  # surface a boolean output the publish job can gate on.
  check-token:
    name: Check npm token
    runs-on: ubuntu-latest
    outputs:
      has_token: ${{ steps.check.outputs.has_token }}
    steps:
      - id: check
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -n "$NPM_TOKEN" ]; then
            echo "has_token=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_token=false" >> "$GITHUB_OUTPUT"
          fi

  # ── Publish per-platform packages, then the main package ─────────────
  publish:
    name: Publish npm packages
    needs: [build-platform, check-token]
    runs-on: ubuntu-latest
    # Env-guarded per T13 release-plz pattern. NPM_TOKEN is T17 scope
    # (registry publish — irreversible, gated on F8 + explicit human "go").
    # Pre-T17 the secret is intentionally absent on cognee-rs so this job
    # silently skips (gated on the check-token precheck output, since `secrets`
    # cannot be used in a job `if:`) and the tag-trigger only exercises the
    # build-platform matrix above (which still warms the cache + verifies
    # cross-compile).
    # always(): publish whatever platforms built, even if some matrix legs fail
    # (not every platform's cross toolchain is solved yet). Publishing is
    # idempotent and skips platforms whose artifact is absent.
    if: ${{ always() && needs.check-token.outputs.has_token == 'true' }}

    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js (with npm auth)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      # Download all platform .node artifacts into their package directories.
      - name: Download all platform artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: neon-*
          path: /tmp/neon-artifacts
          merge-multiple: false

      - name: Place artifacts into platform package directories
        run: |
          for PLATFORM in \
            linux-x64-gnu linux-arm64-gnu \
            darwin-x64 darwin-arm64 \
            win32-x64-msvc; do
            SRC="/tmp/neon-artifacts/neon-${PLATFORM}/cognee_ts_neon.node"
            DEST="ts/platform-packages/${PLATFORM}/cognee_ts_neon.node"
            if [ -f "$SRC" ]; then
              cp "$SRC" "$DEST"
              echo "Placed $DEST"
            else
              echo "WARNING: artifact missing for $PLATFORM" >&2
            fi
          done

      # Publish each platform package.
      - name: Publish platform packages
        working-directory: ts/platform-packages
        run: |
          for PLATFORM in \
            linux-x64-gnu linux-arm64-gnu \
            darwin-x64 darwin-arm64 \
            win32-x64-msvc; do
            PKG="@cognee/neon-${PLATFORM}"
            VER=$(node -p "require('./${PLATFORM}/package.json').version")
            if [ ! -f "${PLATFORM}/cognee_ts_neon.node" ]; then
              echo "SKIP ${PLATFORM}: no .node built" >&2
            elif npm view "${PKG}@${VER}" version >/dev/null 2>&1; then
              echo "SKIP ${PKG}@${VER}: already on registry"
            else
              echo "--- Publishing ${PKG}@${VER} ---"
              npm publish "${PLATFORM}" --access public
            fi
          done

      # Build JS (TypeScript) for the main package.
      - name: Install JS deps (no scripts)
        working-directory: ts
        run: npm install --ignore-scripts

      - name: Build TypeScript
        working-directory: ts
        env:
          COGNEE_SKIP_POSTINSTALL: "1"
        run: npm run build:ts

      # Publish the main cognee-ts package (idempotent: skip if already on registry).
      - name: Publish cognee-ts
        working-directory: ts
        run: |
          VER=$(node -p "require('./package.json').version")
          if npm view "@cognee/cognee-ts@${VER}" version >/dev/null 2>&1; then
            echo "SKIP @cognee/cognee-ts@${VER}: already on registry"
          else
            echo "--- Publishing @cognee/cognee-ts@${VER} ---"
            npm publish --access public
          fi
