name: release-plz

# Plan §5 Phase 3 (oss-split-plan.md:341-345, 496-503): drive crates.io
# releases via release-plz. Config lives in release-plz.toml at the repo root.
#
# Two jobs:
#   * release-plz-pr     — opens/updates the "release PR" that bumps versions
#                          and appends CHANGELOG entries. Runs on every push
#                          to main; does NOT need CARGO_REGISTRY_TOKEN.
#   * release-plz-release — when the release PR is merged, walks the workspace
#                          dependency graph and publishes the bumped crates.
#                          Env-guarded: the publish step only runs when the
#                          CARGO_REGISTRY_TOKEN secret is attached, so the
#                          workflow can safely land before the secret exists.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  # Serialise: never let two release-plz runs race on the same ref.
  group: release-plz-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  release-plz-release:
    name: release-plz release
    runs-on: ubuntu-latest
    # `if: ${{ secrets.X != '' }}` is evaluated before `env:` is built, so the
    # secret has to be read at the job-level guard rather than via env.
    if: ${{ secrets.CARGO_REGISTRY_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          # release-plz needs the full history to compute changelog diffs.
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust (from rust-toolchain.toml)
        run: rustup show

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Run release-plz release
        uses: MarcoIeni/release-plz-action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  release-plz-pr:
    name: release-plz PR
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust (from rust-toolchain.toml)
        run: rustup show

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Run release-plz release-pr
        uses: MarcoIeni/release-plz-action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
