name: Lib Interface Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

concurrency:
  group: lib-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build & Test (stable)
    runs-on: ubuntu-latest

    env:
      OPENAI_KEY: ${{ secrets.OPENAI_KEY }}
      COGNEE_TEST_MODEL_DIR: ${{ github.workspace }}/target/models

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo/target
        uses: Swatinem/rust-cache@v2

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Show toolchain
        run: |
          rustc --version
          cargo --version

      - name: Build
        run: cargo check --all-targets --verbose

      - name: Cache embedding models
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/target/models
          key: embedding-models-${{ hashFiles('scripts/lib/common.sh') }}
          restore-keys: |
            embedding-models-

      - name: Test
        run: bash scripts/run_tests_with_openai.sh

      - name: Build docs
        run: cargo doc --no-deps
