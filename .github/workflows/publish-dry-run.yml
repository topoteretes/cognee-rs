name: publish-dry-run

# Plan §5 Phase 3 (oss-split-plan.md:341-345): walk every publishable workspace
# member through `cargo publish --dry-run` in the same topological order that
# the release workflow (release-publish.yml) publishes, catching packaging issues
# (missing readme/license, excluded files, version-bump mistakes) before they
# hit crates.io.
#
# Sourcing the crate list from scripts/split/publish-order.sh (T10c) keeps the
# CI gate and the local sweep in lock-step.
#
# New-crate handling: a crate that depends on a brand-new sibling not yet on
# crates.io cannot be dry-run-published until that sibling's first real publish
# (cargo resolves deps against the index even in --dry-run). The dry-run step
# downgrades exactly that case to a SKIP so introducing a new workspace crate
# does not red the gate; every other packaging error still fails.
on:
  push:
    branches: [main, master, oss-split]
  pull_request:
  schedule:
    # 04:17 UTC daily — off-peak slot to catch upstream-crates breakage
    # (e.g. a transitive dep yanked overnight) without competing with the
    # main CI lane.
    - cron: '17 4 * * *'
  workflow_dispatch:

concurrency:
  group: publish-dry-run-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_INCREMENTAL: "0"
  CARGO_PROFILE_DEV_DEBUG: "0"

jobs:
  dry-run:
    name: cargo publish --dry-run (every publishable crate)
    # Skip on release/* PRs: they bump every internal `cognee-* = "^X.Y.Z"` dep
    # requirement to a version that is not on crates.io yet, so a per-crate
    # `cargo publish --dry-run` cannot resolve those deps against the index
    # (candidate versions found which didn't match). Only the ordered real
    # publish in release-publish.yml — leaves first — can satisfy them. Packaging
    # (readme/license/excluded files) is already validated on every non-release
    # PR at the published baseline, so nothing is lost by skipping here.
    if: >-
      github.event_name != 'pull_request' ||
      !startsWith(github.head_ref, 'release/')
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      # Reclaim runner disk before packaging. Packaging 22 crates plus
      # their .crate tarballs in target/package/ can exceed the default 14 GB
      # runner disk; android/dotnet/haskell tool-caches and docker images are
      # the cheapest wins.
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          swap-storage: false
          docker-images: true

      - name: Install Rust (from rust-toolchain.toml)
        run: rustup show

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: publish-dry-run-v1
          cache-on-failure: true

      - name: Generate lockfile if missing
        run: |
          if [ ! -f Cargo.lock ]; then
            cargo generate-lockfile
          fi

      - name: Dry-run publish each crate in topological order
        run: |
          set -euo pipefail
          # Workspace member names, used to tell a "new crate not yet on the
          # index" failure apart from a genuine packaging/dependency error.
          ws_members="$(cargo metadata --no-deps --format-version 1 --manifest-path Cargo.toml \
            | python3 -c 'import json,sys; print("\n".join(p["name"] for p in json.load(sys.stdin)["packages"]))')"
          is_ws_member() { printf '%s\n' "$ws_members" | grep -qxF "$1"; }

          : > /tmp/dry-run.log
          fails=0
          skips=0
          while IFS= read -r c; do
            [ -z "$c" ] && continue
            printf '── %-32s ' "$c"
            crate_log="$(mktemp)"
            if cargo publish --dry-run --no-verify --allow-dirty -p "$c" \
                  > "$crate_log" 2>&1; then
              echo OK
            else
              # `cargo publish` resolves deps against the crates.io index even in
              # --dry-run, so a crate that depends on a brand-new sibling (one not
              # yet published) cannot dry-run until that sibling's first real
              # publish — which release-publish.yml does leaves-first. Downgrade
              # exactly that case ("no matching package named `<workspace crate>`
              # found") to a SKIP; every other failure (missing readme/license,
              # excluded files, version-bump mistakes, a genuinely missing
              # external dep) is still a hard failure.
              missing="$(grep -oE 'no matching package named `[^`]+` found' "$crate_log" \
                | head -1 | sed -E 's/^no matching package named `([^`]+)` found$/\1/' || true)"
              # Same root cause, different wording: a workspace sibling that IS on
              # the index but not yet at the required version (e.g. a reserved
              # placeholder like `cognee 0.0.0`, or a release/* bump). cargo emits
              # "failed to select a version for the requirement `<crate> = ..."
              # instead of "no matching package". Only the ordered real publish
              # satisfies it, so downgrade to SKIP too — still guarded to
              # workspace members, so a genuine external version conflict fails.
              unmet="$(grep -oE 'failed to select a version for the requirement `[^ ]+ =' "$crate_log" \
                | head -1 | sed -E 's/^failed to select a version for the requirement `([^ ]+) =$/\1/' || true)"
              if [ -n "$missing" ] && is_ws_member "$missing"; then
                echo "SKIP (depends on not-yet-published workspace crate '$missing')"
                skips=$((skips + 1))
              elif [ -n "$unmet" ] && is_ws_member "$unmet"; then
                echo "SKIP (workspace crate '$unmet' not yet published at the required version)"
                skips=$((skips + 1))
              else
                echo FAIL
                fails=$((fails + 1))
              fi
            fi
            cat "$crate_log" >> /tmp/dry-run.log
            rm -f "$crate_log"
          done < <(scripts/split/publish-order.sh)
          echo
          echo "=== summary: ${fails} failure(s), ${skips} skip(s) ==="
          if [ "$fails" -gt 0 ]; then
            echo "=== full log ==="
            cat /tmp/dry-run.log
            exit 1
          fi
