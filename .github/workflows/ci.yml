name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

concurrency:
  group: ci-${{ github.ref }}-${{ github.sha }}
  cancel-in-progress: true

env:
  # Applied to all jobs so the shared rust-cache has consistent rustc
  # fingerprints. Keeping this workflow-wide prevents one job restoring
  # a cache built with a different debug level and triggering a mass
  # rebuild that blows out the runner disk.
  CARGO_PROFILE_DEV_DEBUG: "0"

jobs:
  # ── Stage 1: Quick lints (fast fail) ──────────────────────────────────
  lint:
    name: Lint (fmt + check + clippy)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Install mold linker
        uses: rui314/setup-mold@v1
        with:
          make-default: true

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          swap-storage: false
          docker-images: true

      - name: Cache cargo/target
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: workspace-v3

      - name: rustfmt (check)
        run: cargo fmt --all -- --check

      - name: Compilation check
        run: cargo check --all-targets

      - name: clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      # Telemetry feature is OFF by default per design decision 1, so the
      # default `cargo check --all-targets` above only covers the noop arm.
      # This step exercises the OTEL-on code path (init_telemetry, OTLP
      # exporter, tracing-opentelemetry bridge) at compile time.
      - name: Compilation check (telemetry feature)
        env:
          CARGO_TARGET_DIR: target/telemetry
        run: cargo check --all-targets --features telemetry

      # Mirror of the above for clippy. Catches cfg-gated lints that the
      # noop-arm clippy run cannot see. We do NOT pass `--all-features`
      # because the workspace also ships android-* features that change
      # link targets; we want the precise (default + telemetry) combo a
      # downstream user would enable via `cargo build --features telemetry`.
      - name: clippy (telemetry feature)
        env:
          CARGO_TARGET_DIR: target/telemetry
        run: cargo clippy --all-targets --features telemetry -- -D warnings

      # Canary for cfg(not(feature = "telemetry")) drift: ensures the noop
      # path in cognee-observability compiles cleanly even if `default`
      # ever grows a transitive dep that accidentally enables telemetry.
      # Scoped to `-p cognee-lib` to keep the build small (no rebuild of
      # the full workspace's binaries).
      - name: Compilation check (no default features)
        env:
          CARGO_TARGET_DIR: target/no-default
        run: cargo check -p cognee-lib --no-default-features

  # ── Stage 2: Build and run tests (depends on lint) ────────────────────
  test:
    name: Test (stable)
    needs: lint
    runs-on: ubuntu-latest

    env:
      OPENAI_URL: https://api.openai.com/v1
      OPENAI_TOKEN: ${{ secrets.OPENAI_KEY }}
      OPENAI_MODEL: gpt-4o-mini
      COGNEE_TEST_MODEL_DIR: ${{ github.workspace }}/target/models

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Install mold linker
        uses: rui314/setup-mold@v1
        with:
          make-default: true

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          swap-storage: true
          docker-images: true

      - name: Cache cargo/target
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: workspace-v3

      - name: Show toolchain
        run: |
          rustc --version
          cargo --version

      - name: Cache embedding models
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/target/models
          key: embedding-models-${{ hashFiles('scripts/lib/common.sh') }}
          restore-keys: |
            embedding-models-

      - name: Test
        run: bash scripts/run_tests_with_openai.sh

      # Telemetry-feature test lane. The integration test from task 01-10
      # spawns an in-process tonic gRPC server on 127.0.0.1:0; no external
      # OTLP collector is needed. Scoped to `-p cognee-observability`
      # because that is where init_telemetry, OtelGuard, and the OTLP
      # parity tests live; the rest of the workspace is already tested
      # in the noop arm above.
      - name: Test (telemetry feature)
        env:
          CARGO_TARGET_DIR: target/telemetry
        run: cargo test -p cognee-observability --features telemetry -- --nocapture

      - name: Build docs
        run: cargo doc --no-deps

      # Optional: rustdoc with the telemetry feature on, to catch
      # cfg(feature = "telemetry") doc-link breakage from task 01-11.
      - name: Build docs (telemetry feature)
        env:
          CARGO_TARGET_DIR: target/telemetry
        run: cargo doc --no-deps --features telemetry

  # ── Stage 3: Language binding checks (depends on test, parallel with each other) ──
  capi-check:
    name: C API Check
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: rui314/setup-mold@v1
        with:
          make-default: true
      - run: sudo apt-get update && sudo apt-get install -y cmake protobuf-compiler
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: workspace-v3
      - run: bash capi/scripts/check.sh

  python-check:
    name: Python Bindings Check
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: rui314/setup-mold@v1
        with:
          make-default: true
      - run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: workspace-v3
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Create venv and install dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install maturin pytest pytest-asyncio
      - name: Run Python check
        run: |
          source .venv/bin/activate
          bash python/scripts/check.sh

  js-check:
    name: JS/TS Bindings Check
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: rui314/setup-mold@v1
        with:
          make-default: true
      - run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: workspace-v3
          workspaces: |
            . -> target
            js/cognee-neon -> target
          cache-on-failure: true
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "js/package-lock.json"
      - run: bash js/scripts/check.sh
