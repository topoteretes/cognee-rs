name: CI

# Keyed test suite — requires repository secrets (OPENAI_KEY) for the LLM
# integration tests. GitHub does not pass secrets to `pull_request` runs from
# forks, so every job here is gated to in-repo refs (push / workflow_dispatch /
# same-repo PRs) via the `head.repo.full_name == github.repository` check on the
# entry jobs (`lint`, `msrv`); the rest cascade through `needs`. Fork PRs skip
# this workflow entirely and are covered by the fork-safe `Community Checks
# (No Secrets)` workflow instead. Mirrors the upstream Python cognee
# `test_suites.yml` / `community_tests.yml` split.

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
    types: [ opened, synchronize, reopened ]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}-${{ github.sha }}
  cancel-in-progress: true

env:
  # Applied to all jobs so the shared rust-cache has consistent rustc
  # fingerprints. Keeping this workflow-wide prevents one job restoring
  # a cache built with a different debug level and triggering a mass
  # rebuild that blows out the runner disk.
  CARGO_PROFILE_DEV_DEBUG: "0"
  # Incremental state in target/incremental/ is useless on CI (each run
  # starts from a fresh checkout) and wastes 2-5 GB of runner disk.
  CARGO_INCREMENTAL: "0"
  # Redirect the ort-sys ONNX Runtime binary download into target/ so
  # Swatinem/rust-cache picks it up. Without this the binary lands in
  # ~/.cache/ort.pyke.io which Swatinem does NOT cache, causing a link
  # error on any job that gets a cache hit for target/ but a fresh runner
  # (the cached build script output points to the absent ~/.cache path).
  ORT_CACHE_DIR: ${{ github.workspace }}/target/ort-cache
  # ccache keys on the compiler binary by mtime by default; runner-image
  # updates touch /usr/bin/cc+gcc mtimes and would silently invalidate the
  # whole cache. Hash the compiler content instead.
  CCACHE_COMPILERCHECK: content

jobs:
  # ── Stage 1: Quick lints (fast fail) ──────────────────────────────────
  lint:
    name: Lint (fmt + check + clippy)
    runs-on: ubuntu-latest
    # In-repo only: fork PRs get no secrets and are covered by the
    # `Community Checks (No Secrets)` workflow. `test`, `pgvector-spans` and the
    # binding-check jobs cascade off this gate via `needs`.
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Install mold linker
        uses: rui314/setup-mold@v1
        with:
          make-default: true

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          # large-packages removes ^llvm-.* which takes out libclang; android-litert
          # bindgen needs libclang, so keep it.
          large-packages: false
          swap-storage: false
          docker-images: true

      # ccache for lbug's bundled Ladybug C++ build (~1000 compiler calls).
      # scripts/ccache-launcher.sh (wired via .cargo/config.toml [env]) picks
      # ccache up automatically once this action puts it on PATH. Cargo
      # relocates lbug's OUT_DIR whenever its build-dep closure (cc, cmake,
      # cxx-build, …) shifts in a fresh resolution — no lockfile is committed —
      # which otherwise forces a from-scratch C++ rebuild in every job at
      # once. See docs/build/lbug-rebuilds.md.
      # Only this job saves the cache: it is the root of the job DAG and
      # compiles the same objects the downstream jobs need (ccache keys on
      # compiler+flags+source content, not on cargo's unit hash, so even the
      # capi/js workspaces' independent resolutions hit the same entries).
      # Downstream jobs restore-only to avoid pushing six near-identical
      # caches per run into the 10 GB repo cache quota.
      - name: ccache (lbug bundled C++)
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: lbug-cxx
          max-size: 1G

      # Lint has its own Swatinem key (workspace-lint-v6) separate from the
      # test job (workspace-test-v6). The lint job runs only `cargo check` /
      # `cargo clippy`, which produce .rmeta but NOT .rlib files. Sharing a
      # key with the test job would cause the test job to inherit a cache full
      # of .rmeta stubs and have to rebuild everything from scratch on every
      # run — including re-running the ort-sys build script that fetches the
      # ONNX Runtime static library.
      - name: Cache cargo/target (lint)
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: workspace-lint-v6

      # ort-sys downloads the ONNX Runtime static library to ORT_CACHE_DIR
      # (target/ort-cache) during its build script. We cache it separately so
      # the first cold build of any job doesn't need to re-download it.
      # Key uses "cpu" to distinguish from a potential CUDA-enabled build.
      - name: Cache ORT binary
        uses: actions/cache@v4
        with:
          path: target/ort-cache
          key: ort-v2.0.0-rc.12-cpu-linux-x86_64

      - name: rustfmt (check)
        run: cargo fmt --all -- --check

      - name: Compilation check
        run: cargo check --all-targets

      # Use default features instead of --all-features.
      # --all-features activates ort-cuda / ort-tensorrt, which causes ort-sys
      # to download a separate ~100 MB CUDA-enabled ONNX Runtime static library
      # to a different hash path in target/ort-cache. That CUDA binary is never
      # used in CI (no GPU), but it bloats the cache and can produce a stale
      # rustc-link-search path that breaks the link step in the test job.
      # The former `--features android-litert,server` invocation was dropped
      # in T16: the `android-litert` LiteRT adapter moved to closed in T4 and
      # the `server` feature moved with the cloud commands in T15f, so OSS
      # no longer defines either feature.
      - name: clippy
        run: cargo clippy --all-targets -- -D warnings

      # Telemetry feature is OFF by default per design decision 1, so the
      # default `cargo check --all-targets` above only covers the noop arm.
      # This step exercises the OTEL-on code path (init_telemetry, OTLP
      # exporter, tracing-opentelemetry bridge) at compile time.
      - name: Compilation check (telemetry feature)
        env:
          CARGO_TARGET_DIR: target/telemetry
        run: cargo check --all-targets --features telemetry

      # Mirror of the above for clippy. Catches cfg-gated lints that the
      # noop-arm clippy run cannot see. We pass the precise (default +
      # telemetry) combo a downstream user would enable via
      # `cargo build --features telemetry`.
      - name: clippy (telemetry feature)
        env:
          CARGO_TARGET_DIR: target/telemetry
        run: cargo clippy --all-targets --features telemetry -- -D warnings

      # Canary for cfg(not(feature = "telemetry")) drift: ensures the noop
      # path in cognee-observability compiles cleanly even if `default`
      # ever grows a transitive dep that accidentally enables telemetry.
      # Scoped to `-p cognee-lib` to keep the build small (no rebuild of
      # the full workspace's binaries).
      - name: Compilation check (no default features)
        env:
          CARGO_TARGET_DIR: target/no-default
        run: cargo check -p cognee-lib --no-default-features

      - name: License presence (every published crate)
        run: |
          cargo metadata --no-deps --format-version 1 \
          | python3 -c 'import sys,json;\
            p=json.load(sys.stdin)["packages"];\
            bad=[x["name"] for x in p if not x.get("license") and not x.get("license_file")];\
            print("missing license:",bad); sys.exit(1 if bad else 0)'

  # ── MSRV floor: build against the declared rust-version (T2.3) ─────────
  # rust-toolchain.toml pins the toolchain repo-wide (it takes precedence over
  # @stable), so every lane already builds on the floor; this lane additionally
  # installs 1.91.0 explicitly so a newer-than-MSRV API is caught before release
  # even if the pin moves.
  # Note: 1.89 is the real floor on x86_64 — the embedded qdrant `quantization`
  # crate uses AVX-512 target features/intrinsics (avx512vl, avx512vpopcntdq,
  # stdarch_x86_avx512) stabilized in Rust 1.89. (home@0.5.12 / icu_collections
  # already require 1.88; qdrant raises it to 1.89.) Edition 2024 + resolver 3
  # would allow 1.85 in principle. The aarch64 build never compiles the AVX-512
  # path, so this only manifests on x86_64.
  msrv:
    name: MSRV (1.91)
    runs-on: ubuntu-latest
    # In-repo only (no `needs`, so it carries its own gate). See `lint`.
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust 1.89
        uses: dtolnay/rust-toolchain@1.91.0

      - name: Install mold linker
        uses: rui314/setup-mold@v1
        with:
          make-default: true

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          swap-storage: false
          docker-images: true

      - name: ccache (lbug bundled C++, restore-only)
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: lbug-cxx
          max-size: 1G
          save: false

      - name: Cache cargo/target (msrv)
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: workspace-msrv-v1
          cache-on-failure: true

      - name: Cache ORT binary
        uses: actions/cache@v4
        with:
          path: target/ort-cache
          key: ort-v2.0.0-rc.12-cpu-linux-x86_64

      - name: Check (MSRV)
        run: cargo +1.91.0 check --all-targets

  # ── wasm32 Config-1 lane: logic crates compile + run on wasm32 ────────
  # The wasm smoke-test files are #![cfg(target_arch = "wasm32")], so the native
  # lint/check lanes compile them to empty crates and never type-check them.
  # This lane builds the logic crates for wasm32-unknown-unknown, type-checks
  # every wasm test target (so a DocumentChunk-field or chunk_text-signature
  # drift fails CI), and runs the Node smoke test. The headless-browser runner
  # stays manual — it needs a WebDriver + browser; see docs/spike-wasm-config1.md.
  # No protoc/cmake/lbug here: the three logic crates pull none of them.
  wasm:
    name: wasm32 (Config-1 logic crates)
    runs-on: ubuntu-latest
    # In-repo only (no `needs`, so it carries its own gate). See `lint`. Needs no
    # secrets itself, but it belongs to the keyed workflow that fork PRs skip
    # wholesale — the fork-safe `Community Checks` workflow covers forks instead.
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # rust-toolchain.toml pins the repo to 1.91, and that pin takes precedence
      # over @stable — so `cargo build --target wasm32-unknown-unknown` runs under
      # 1.91, not stable. The wasm32 std component must be on the *pinned*
      # toolchain. `rustup target add` honors the rust-toolchain.toml override
      # (exactly as scripts/check_all.sh does locally); the action's `targets:`
      # input adds it to @stable instead, which is why CI hit
      # `error[E0463]: can't find crate for std`.
      - name: Add wasm32 target to the pinned toolchain
        run: rustup target add wasm32-unknown-unknown

      - name: Install Node (for the wasm-bindgen test runner)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache cargo/target (wasm)
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: wasm-v1

      # Build first so Cargo.lock exists (it is gitignored) before we pin the
      # runner to the resolved wasm-bindgen version below.
      - name: Build logic crates (wasm32)
        run: |
          cargo build -p cognee-models -p cognee-utils --target wasm32-unknown-unknown
          cargo build -p cognee-chunking --no-default-features --features tiktoken --target wasm32-unknown-unknown

      # Drift guard: type-check every wasm test target. --no-run needs no runner,
      # so it works before wasm-bindgen-cli is installed.
      - name: Type-check wasm test targets (drift guard)
        run: |
          # utils/models have no wasm-specific tests, but this compiles their wasm
          # *test* build — which is what this PR's tokio dev-dep split (utils) and
          # the cfg(not(wasm32)) gates on the retry (utils) and data_input (models)
          # test modules exist to keep green. `cargo build` only covers the lib, so
          # without this a regression to those gates stays invisible until someone
          # runs the wasm tests by hand.
          cargo test -p cognee-utils -p cognee-models --target wasm32-unknown-unknown --no-run
          # chunking under BOTH feature configs: the shared wasm_smoke module has a
          # #[cfg(feature = "tiktoken")] arm, and the no-feature build of
          # tests/wasm.rs is otherwise only ever exercised by the live Node step
          # below (which depends on the wasm-bindgen-cli install). A renamed
          # DocumentChunk field or a changed chunk_text signature breaks here.
          # Always spell chunking's wasm feature set explicitly with
          # --no-default-features [--features tiktoken] — identical to the build
          # step and check_all.sh — so the checks can't diverge if `default` grows.
          cargo test -p cognee-chunking --no-default-features --target wasm32-unknown-unknown --no-run
          cargo test -p cognee-chunking --no-default-features --features tiktoken --target wasm32-unknown-unknown --no-run

      # wasm-bindgen-test-runner must match the resolved wasm-bindgen crate
      # exactly or it refuses to run; read the version from the just-generated lock.
      - name: Install wasm-bindgen-test-runner (matching the locked version)
        run: |
          WB_VER=$(sed -n '/^name = "wasm-bindgen"$/{n;s/^version = "\(.*\)"$/\1/p}' Cargo.lock)
          echo "Installing wasm-bindgen-cli $WB_VER"
          cargo install wasm-bindgen-cli --version "$WB_VER" --locked

      - name: Run Node smoke tests (no-features + tiktoken)
        run: |
          cargo test -p cognee-chunking --no-default-features --target wasm32-unknown-unknown --test wasm
          cargo test -p cognee-chunking --no-default-features --features tiktoken --target wasm32-unknown-unknown --test wasm

  # ── Stage 2: Build and run tests (depends on lint) ────────────────────
  test:
    name: Test (stable)
    needs: lint
    runs-on: ubuntu-latest

    env:
      OPENAI_URL: https://api.openai.com/v1
      OPENAI_TOKEN: ${{ secrets.OPENAI_KEY }}
      OPENAI_MODEL: gpt-4o-mini
      # Select the tuned nextest CI profile (.config/nextest.toml): parallel
      # execution, fail-fast off, one retry for transient external flakiness.
      # nextest reads NEXTEST_PROFILE natively, so scripts/run_tests_with_openai.sh
      # needs no extra flags.
      NEXTEST_PROFILE: ci
      # Run cassette-converted integration tests offline from committed cassettes
      # (crates/*/tests/fixtures/cassettes/) instead of calling the live OpenAI
      # API. Tests still on the real API ignore this var and use OPENAI_TOKEN.
      # Cassettes are re-recorded on demand via the record-cassettes workflow.
      # See docs/build/ci-test-parallelism.md / Approach E.
      COGNEE_TEST_REPLAY: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Install mold linker
        uses: rui314/setup-mold@v1
        with:
          make-default: true

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true
          docker-images: true

      # Restore-only: the lint job saves the shared lbug C++ ccache (see the
      # comment there).
      - name: ccache (lbug bundled C++, restore-only)
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: lbug-cxx
          max-size: 1G
          save: false

      # The test job has its own Swatinem key (workspace-test-v6) separate from
      # lint (workspace-lint-v6). The test job runs `cargo nextest` which
      # compiles everything to .rlib for linking. On the first run this is a
      # cold build (~15 min), but workspace-test-v6 is then populated with
      # .rlib files and subsequent runs are fast. cache-on-failure=true ensures
      # even a first-run compile failure seeds the cache so the rerun is warm.
      - name: Cache cargo/target (test)
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: workspace-test-v6
          cache-on-failure: true

      - name: Cache ORT binary
        uses: actions/cache@v4
        with:
          path: target/ort-cache
          key: ort-v2.0.0-rc.12-cpu-linux-x86_64

      - name: Show toolchain
        run: |
          rustc --version
          cargo --version

      # Verify that the ORT binary was correctly restored before compilation.
      # This step is intentionally non-blocking (|| true) — it only prints
      # diagnostics so CI logs show exactly what is (or isn't) in the cache.
      - name: Verify ORT binary cache
        run: |
          echo "=== ORT_CACHE_DIR: ${ORT_CACHE_DIR} ==="
          if [ -d "${ORT_CACHE_DIR}/dfbin" ]; then
            find "${ORT_CACHE_DIR}/dfbin" -type f | sort
            echo "=== sizes ==="
            du -sh "${ORT_CACHE_DIR}/dfbin"/*/*/ 2>/dev/null || true
          else
            echo "(dfbin directory not found — ort-sys will download on first build)"
          fi

      - name: Test
        run: bash scripts/run_tests_with_openai.sh

  # ── Stage 2.5: Docs + feature-variant lanes (depends on lint, parallel with `test`) ──
  # Moved out of the `test` job so they run concurrently with it instead of
  # serially after the workspace test run. Together these were ~14 min of the
  # test job's wall time (the two `cargo doc` builds ≈ 11 min, the telemetry /
  # no-default test lanes ≈ 3 min); off the test critical path they no longer
  # gate the downstream binding jobs. None of these need OpenAI credentials.
  docs-and-extras:
    name: Docs + feature lanes
    needs: lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Install mold linker
        uses: rui314/setup-mold@v1
        with:
          make-default: true

      # cmake + protoc are needed by lbug's bundled C++ build (via cognee-lib).
      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y cmake protobuf-compiler

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          swap-storage: false
          docker-images: true

      - name: ccache (lbug bundled C++, restore-only)
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: lbug-cxx
          max-size: 1G
          save: false

      # Restore the test job's cache read-only (it has the compiled rlibs the
      # doc/feature builds reuse). save-if:false so this parallel job never races
      # the `test` job's save of the same key.
      - name: Cache cargo/target (test, restore-only)
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: workspace-test-v6
          save-if: "false"

      - name: Cache ORT binary
        uses: actions/cache@v4
        with:
          path: target/ort-cache
          key: ort-v2.0.0-rc.12-cpu-linux-x86_64

      # Telemetry-feature test lane. The integration test from task 01-10
      # spawns an in-process tonic gRPC server on 127.0.0.1:0; no external
      # OTLP collector is needed. Covers both the OTEL crate
      # (cognee-observability) and the product-analytics crate
      # (cognee-telemetry, gap 02). TELEMETRY_DISABLED=1 is set globally
      # for belt-and-braces network isolation: the mockito-driven
      # integration tests (byte_parity, dispatch_with_mockito) explicitly
      # opt back in via COGNEE_TELEMETRY_INTEGRATION_TEST and inject the
      # mockito URL, while every other code path stays disabled so no
      # accidental egress to the live test.prometh.ai proxy can occur.
      - name: Test (telemetry feature, observability + telemetry crates)
        env:
          CARGO_TARGET_DIR: target/telemetry
          TELEMETRY_DISABLED: "1"
        run: |
          cargo test -p cognee-observability --features telemetry -- --nocapture
          cargo test -p cognee-telemetry --features telemetry -- --nocapture

      # Noop-fallback test lane for the cognee-telemetry crate. Exercises
      # crates/telemetry/tests/noop_fallback.rs (task 02-08) so we catch
      # cfg(not(feature = "telemetry")) drift at *runtime*, not just at
      # compile time.
      - name: Test (no default features, telemetry crate noop fallback)
        env:
          CARGO_TARGET_DIR: target/no-default
        run: cargo test -p cognee-telemetry --no-default-features -- --nocapture

      # RUSTDOCFLAGS=-W missing_docs surfaces undocumented public items as
      # rustdoc warnings (task 23) without failing the `clippy -- -D warnings`
      # gate. The lint is scoped to the doc job (not a crate `#![warn]`
      # attribute) precisely because a crate-level `#![warn(missing_docs)]`
      # would be promoted to an error by `-D warnings` and break the build,
      # whereas `cargo doc` runs without `-D warnings` and only warns.
      - name: Build docs
        env:
          # `--cfg docsrs` activates the `#[cfg(docsrs)]` doc-attribute paths
          # added in T10b (e.g. `#[doc(cfg(feature = "..."))]` feature labels)
          # so CI exercises the same rustdoc rendering crates.io will use.
          RUSTDOCFLAGS: -W missing_docs --cfg docsrs
        run: cargo doc --no-deps

      # Optional: rustdoc with the telemetry feature on, to catch
      # cfg(feature = "telemetry") doc-link breakage from task 01-11.
      - name: Build docs (telemetry feature)
        env:
          CARGO_TARGET_DIR: target/telemetry
          RUSTDOCFLAGS: -W missing_docs --cfg docsrs
        run: cargo doc --no-deps --features telemetry

  # ── Stage 2.5: Postgres-only span tests (depends on lint, runs in parallel with `test`) ──
  # The pgvector adapter span tests in
  # `crates/vector/tests/pgvector_span_instrumentation.rs` skip silently
  # when `cognee_test_utils::pg_test_url()` returns `None`, so the host
  # `test` lane's `cargo test --workspace` invocation never actually
  # exercises them. This dedicated lane spins up a Postgres service
  # container with the pgvector extension so the spans land on a real
  # backend in CI. Added in gap 04 (task 04-11) once
  # `PgvectorAdapter` started emitting `cognee.db.vector.*` spans with
  # `cognee.db.system="pgvector"`.
  #
  # `pg_graph_adapter` is intentionally not exercised here — per-method
  # span instrumentation was deferred in 04-08 pending a fan-in
  # refactor (the public `query` is a stub returning
  # `QueryError("not supported")`).
  pgvector-spans:
    name: Test (Postgres span lane)
    needs: lint
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: cognee_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_PROVIDER: postgres
      DB_HOST: localhost
      DB_PORT: "5432"
      DB_NAME: cognee_test
      DB_USERNAME: postgres
      DB_PASSWORD: postgres

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Install mold linker
        uses: rui314/setup-mold@v1
        with:
          make-default: true

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: ccache (lbug bundled C++, restore-only)
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: lbug-cxx
          max-size: 1G
          save: false

      # Restore-only: this lane runs one small `cargo test -p cognee-vector`,
      # fully covered by the `test` job's debug build of the same key. Saving
      # here only added a divergent version of workspace-test-v6 (cache churn),
      # so it restores but does not save.
      - name: Cache cargo/target (test, restore-only)
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: workspace-test-v6
          save-if: "false"

      - name: Cache ORT binary
        uses: actions/cache@v4
        with:
          path: target/ort-cache
          key: ort-v2.0.0-rc.12-cpu-linux-x86_64

      - name: Run pgvector span instrumentation tests
        run: cargo test -p cognee-vector --test pgvector_span_instrumentation -- --nocapture

  # ── Stage 3: Language binding checks (depend on lint, parallel with `test`) ──
  # Gated on `lint` (not `test`) so the binding builds run concurrently with the
  # workspace test run instead of serially after it — the C API job in particular
  # is a long pole (~13–40 min) that previously started only once `test` finished.
  # `lint` already proves the workspace compiles; these jobs validate the binding
  # layers, a separate concern from the test result. Trade-off: they still run if
  # a test later fails, but on green runs the wall-clock saving is large.
  capi-check:
    name: C API Check
    needs: lint
    runs-on: ubuntu-latest

    env:
      OPENAI_URL: https://api.openai.com/v1
      OPENAI_TOKEN: ${{ secrets.OPENAI_KEY }}
      OPENAI_MODEL: gpt-4o-mini

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: rui314/setup-mold@v1
        with:
          make-default: true
      - run: sudo apt-get update && sudo apt-get install -y cmake protobuf-compiler
      # The capi job runs three CMake builds (default, slim, panic) plus cargo
      # check × 2 on a runner that starts with ~25 GB free. Freeing the same set
      # of unused system packages as the other jobs gives back ~10 GB of headroom
      # and prevents the "Disk full?" linker crash seen when the runner fills up.
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          swap-storage: false
          docker-images: true
      # Restore-only: the lint job saves the shared lbug C++ ccache. The capi
      # workspace resolves its own dep graph, but ccache keys on
      # compiler+flags+source content, so it hits the same entries.
      - name: ccache (lbug bundled C++, restore-only)
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: lbug-cxx
          max-size: 1G
          save: false
      # Restore-only (save-if:false): the capi workspace's cache is the single
      # largest in the repo (~3 GB, covering both the root and capi/ target
      # dirs). Saving it kept the repo over GitHub's 10 GB cache quota, so the
      # LRU eviction rotated through the smaller working caches (lint, test,
      # python) and left them cold (~37-min lint, ~61-min python). Dropping the
      # save frees that ~3 GB so those stay warm; capi-check then runs cold
      # (~37 min) every run (no job writes this key anymore), but it runs in
      # parallel off `lint` and is no longer the binding constraint. Net: a
      # stable critical path of ~lint(warm) + capi(~37 min cold) ≈ 42 min, vs a
      # budget that otherwise bounces 70–98 min as eviction rotates. Re-enable
      # the save (and bump the key) if the repo's cache quota is ever raised.
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: capi-check-v1
          workspaces: |
            . -> target
            capi -> target
          save-if: "false"
      - uses: actions/cache@v4
        with:
          path: capi/target/ort-cache
          key: ort-v2.0.0-rc.12-cpu-linux-x86_64
      # ORT_CACHE_DIR is read by ort-sys build script; point it at capi/target/
      # so the capi workspace build uses the same cached binary.
      - name: Run C API check (default + slim build + CMake examples)
        env:
          ORT_CACHE_DIR: ${{ github.workspace }}/capi/target/ort-cache
        run: bash capi/scripts/check.sh

  python-check:
    name: Python Bindings Check
    needs: lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: rui314/setup-mold@v1
        with:
          make-default: true
      - run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      # The release maturin build of the PyO3 extension compiles the whole
      # workspace (incl. lbug) and fills the runner's ~25 GB. Free the same
      # unused system packages as the other jobs (~10 GB headroom) to avoid the
      # "No space left on device" failure when building lbug's rlib.
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          swap-storage: false
          docker-images: true
      # Restore-only: the lint job saves the shared lbug C++ ccache.
      - name: ccache (lbug bundled C++, restore-only)
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: lbug-cxx
          max-size: 1G
          save: false
      # Restore-only share of workspace-test-v6: `maturin develop` (python/scripts/
      # check.sh) builds in DEBUG, so it reuses the test job's debug dep rlibs —
      # maturin then only compiles the PyO3 extension + workspace crates. A
      # dedicated key was tried (assuming a release build) but it just added a
      # ~3 GB cache that pushed the repo over GitHub's 10 GB quota and got evicted.
      # restore-only (save:false) so it benefits from the cache without writing a
      # divergent copy (the `test` job is the sole writer).
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: workspace-test-v6
          save-if: "false"
      - uses: actions/cache@v4
        with:
          path: target/ort-cache
          key: ort-v2.0.0-rc.12-cpu-linux-x86_64
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Create venv and install dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install maturin
          cd python && pip install -e ".[test]"
      - name: Run Python check
        run: |
          source .venv/bin/activate
          bash python/scripts/check.sh

  ts-check:
    name: JS/TS Bindings Check
    needs: lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: rui314/setup-mold@v1
        with:
          make-default: true
      # cmake is required by the `lbug` crate (pulled in via cognee-lib's
      # `ladybug` feature), whose build.rs compiles bundled C++ with CMake.
      - run: sudo apt-get update && sudo apt-get install -y cmake protobuf-compiler
      # Restore-only: the lint job saves the shared lbug C++ ccache. The
      # ts/cognee-ts-neon workspace resolves its own dep graph, but ccache keys
      # on compiler+flags+source content, so it hits the same entries.
      - name: ccache (lbug bundled C++, restore-only)
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: lbug-cxx
          max-size: 1G
          save: false
      # Dedicated key, NOT shared workspace-test-v6: the Neon module build
      # differs from the debug test cache, so sharing churned/polluted it. Its
      # own key caches the binding build across runs.
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: workspace-ts-v1
          workspaces: |
            . -> target
            ts/cognee-ts-neon -> target
          cache-on-failure: true
      - uses: actions/cache@v4
        with:
          path: target/ort-cache
          key: ort-v2.0.0-rc.12-cpu-linux-x86_64
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "ts/package.json"
      - run: bash ts/scripts/check.sh

  java-check:
    name: Java Bindings Check
    needs: lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: rui314/setup-mold@v1
        with:
          make-default: true
      # cmake is required by the lbug crate (via cognee-lib's ladybug feature).
      - run: sudo apt-get update && sudo apt-get install -y cmake protobuf-compiler
      - name: Set up JDK (Temurin 17)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: ccache (lbug bundled C++, restore-only)
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: lbug-cxx
          max-size: 1G
          save: false
      # Dedicated cache key for the standalone JNI workspace (mirrors ts-check).
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: workspace-java-v1
          workspaces: |
            . -> target
            java/cognee-java-jni -> target
          cache-on-failure: true
      - uses: actions/cache@v4
        with:
          path: target/ort-cache
          key: ort-v2.0.0-rc.12-cpu-linux-x86_64
      - run: bash java/scripts/check.sh

  # ── Aggregate status (single required check for branch protection) ────
  # Gated to in-repo like the rest of the suite, so it does not run — and does
  # not report failure — on fork PRs (those are covered by the community
  # workflow's own aggregator). On in-repo refs every job above runs, so any
  # non-success here means the keyed suite failed. Mirrors the upstream Python
  # cognee `notify` aggregator.
  notify:
    name: Test Suite Status
    needs: [ lint, msrv, wasm, test, docs-and-extras, pgvector-spans, capi-check, python-check, ts-check, java-check ]
    runs-on: ubuntu-latest
    if: >-
      !cancelled() &&
      (github.event_name != 'pull_request' ||
       github.event.pull_request.head.repo.full_name == github.repository)
    steps:
      - name: Check status
        run: |
          if [[ "${{ needs.lint.result }}" == "success" &&
                "${{ needs.msrv.result }}" == "success" &&
                "${{ needs.wasm.result }}" == "success" &&
                "${{ needs.test.result }}" == "success" &&
                "${{ needs.docs-and-extras.result }}" == "success" &&
                "${{ needs.pgvector-spans.result }}" == "success" &&
                "${{ needs.capi-check.result }}" == "success" &&
                "${{ needs.python-check.result }}" == "success" &&
                "${{ needs.ts-check.result }}" == "success" &&
                "${{ needs.java-check.result }}" == "success" ]]; then
            echo "All keyed test-suite jobs passed!"
          else
            echo "One or more keyed test-suite jobs failed."
            exit 1
          fi
