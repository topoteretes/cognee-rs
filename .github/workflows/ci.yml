name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Applied to all jobs so the shared rust-cache has consistent rustc
  # fingerprints. Keeping this workflow-wide prevents one job restoring
  # a cache built with a different debug level and triggering a mass
  # rebuild that blows out the runner disk.
  CARGO_PROFILE_DEV_DEBUG: "0"

jobs:
  # ── Stage 1: Quick lints (fast fail) ──────────────────────────────────
  lint:
    name: Lint (fmt + check + clippy)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Install mold linker
        uses: rui314/setup-mold@v1
        with:
          make-default: true

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          swap-storage: false
          docker-images: true

      - name: Cache cargo/target
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: workspace-v3

      - name: rustfmt (check)
        run: cargo fmt --all -- --check

      - name: Compilation check
        run: cargo check --all-targets

      - name: clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  # ── Stage 2: Build and run tests (depends on lint) ────────────────────
  test:
    name: Test (stable)
    needs: lint
    runs-on: ubuntu-latest

    env:
      OPENAI_URL: https://api.openai.com/v1
      OPENAI_TOKEN: ${{ secrets.OPENAI_KEY }}
      OPENAI_MODEL: gpt-4o-mini
      COGNEE_TEST_MODEL_DIR: ${{ github.workspace }}/target/models

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Install mold linker
        uses: rui314/setup-mold@v1
        with:
          make-default: true

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          swap-storage: true
          docker-images: true

      - name: Cache cargo/target
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: workspace-v3

      - name: Show toolchain
        run: |
          rustc --version
          cargo --version

      - name: Cache embedding models
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/target/models
          key: embedding-models-${{ hashFiles('scripts/lib/common.sh') }}
          restore-keys: |
            embedding-models-

      - name: Test
        run: bash scripts/run_tests_with_openai.sh

      - name: Build docs
        run: cargo doc --no-deps

  # ── Stage 3: Language binding checks (depends on test, parallel with each other) ──
  capi-check:
    name: C API Check
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: rui314/setup-mold@v1
        with:
          make-default: true
      - run: sudo apt-get update && sudo apt-get install -y cmake protobuf-compiler
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: workspace-v3
      - run: bash capi/scripts/check.sh

  python-check:
    name: Python Bindings Check
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: rui314/setup-mold@v1
        with:
          make-default: true
      - run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: workspace-v3
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Create venv and install dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install maturin pytest pytest-asyncio
      - name: Run Python check
        run: |
          source .venv/bin/activate
          bash python/scripts/check.sh

  js-check:
    name: JS/TS Bindings Check
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: rui314/setup-mold@v1
        with:
          make-default: true
      - run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: workspace-v3
          workspaces: |
            . -> target
            js/cognee-neon -> target
          cache-on-failure: true
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "js/package-lock.json"
      - run: bash js/scripts/check.sh
