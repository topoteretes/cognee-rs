name: Java Prebuild

# Build per-platform classifier jars containing the cognee_java cdylib.
# Matrix matches ts-prebuild.yml and the classifiers in
# java/src/main/java/ai/cognee/internal/NativeLibLoader.java.
#
# Each matrix leg builds the cognee_java cdylib for one target and packs a
# single "classifier jar" whose only content is
# native/<classifier>/libcognee_java.{so,dylib,dll}. These are uploaded as
# workflow artifacts; the publish job below deploys them to Maven Central as
# io.github.topoteretes:cognee:<version>:<classifier> (T14) — gated on the
# Central token, so it silently no-ops until the publishing secrets exist.
#
# The per-OS native-dep installs, the MSVC/CRT/ccache fixes, the `cross`
# cross-compile path (ORT_CACHE_DIR=/target/ort-cache + COGNEE_REPO_ROOT +
# SIMSIMD SVE-disable flags), and the ORT prefetch step are cloned verbatim
# from ts-prebuild.yml — they are load-bearing for building cognee-lib
# (lbug/qdrant/ort) on each platform.
#
# LOCAL APPROXIMATION: the full 4-target matrix cannot run locally; only the
# host-platform leg is locally verifiable. To prove the packaging step on the
# host (linux-x86_64):
#   cargo build --release --manifest-path java/cognee-java-jni/Cargo.toml
#   VER=$(sed -n 's:.*<version>\(.*\)</version>.*:\1:p' java/pom.xml | head -1)
#   mkdir -p staging/native/linux-x86_64
#   cp java/cognee-java-jni/target/release/libcognee_java.so staging/native/linux-x86_64/
#   jar cf "cognee-${VER}-linux-x86_64.jar" -C staging native
#   jar tf "cognee-${VER}-linux-x86_64.jar"  # lists native/linux-x86_64/libcognee_java.so

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:

concurrency:
  group: java-prebuild-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_PROFILE_RELEASE_DEBUG: "0"
  CARGO_INCREMENTAL: "0"
  CCACHE_COMPILERCHECK: content

jobs:
  build-platform:
    name: Build ${{ matrix.platform }}
    # Cap each leg so a stuck build (e.g. a hung native compile) fails fast
    # instead of running to the 6h/24h default and burning runner time.
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x64 glibc — native runner
          - platform: linux-x64-gnu
            runner: ubuntu-latest
            rust-target: x86_64-unknown-linux-gnu
            cross: false
            classifier: linux-x86_64
            libfile: libcognee_java.so

          # Linux arm64 glibc — cross via `cross`
          - platform: linux-arm64-gnu
            runner: ubuntu-latest
            rust-target: aarch64-unknown-linux-gnu
            cross: true
            classifier: linux-aarch_64
            libfile: libcognee_java.so

          # macOS arm64 (Apple Silicon). Use macos-15 (default Xcode 16.4):
          # the older macos-14 default (Xcode 15.4) ships a libc++ whose
          # std::construct_at trips a C++20 aggregate-init bug while compiling
          # lbug's bundled C++ (needs Clang 16+ / P0960 support).
          - platform: darwin-arm64
            runner: macos-15
            rust-target: aarch64-apple-darwin
            cross: false
            classifier: osx-aarch_64
            libfile: libcognee_java.dylib

          # Windows x64
          - platform: win32-x64-msvc
            runner: windows-latest
            rust-target: x86_64-pc-windows-msvc
            cross: false
            classifier: windows-x86_64
            libfile: cognee_java.dll

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      # Install cross for cross-compilation jobs.
      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      # mold linker (Linux only, native builds only).
      - name: Install mold linker
        if: runner.os == 'Linux' && !matrix.cross
        uses: rui314/setup-mold@v1
        with:
          make-default: true

      # cmake + protoc needed by lbug and qdrant on Linux.
      - name: Install native build deps (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y cmake protobuf-compiler

      # cmake + protoc on macOS.
      - name: Install native build deps (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake protobuf

      # cmake + protoc on Windows.
      - name: Install native build deps (Windows)
        if: runner.os == 'Windows'
        run: choco install cmake protoc --no-progress

      # lbug (a Kùzu fork) forces the CMake "Ninja" generator, and Ninja+MSVC
      # does NOT search for the compiler — cl.exe/link.exe must already be on
      # PATH via the MSVC developer environment. Without it the build fails with
      # `ninja: CreateProcess: %1 is not a valid Win32 application`. This is the
      # GitHub-hosted equivalent of the `vcvars64.bat` call Kùzu's own Windows
      # CI uses; it exports the MSVC env to all subsequent steps.
      - name: Set up MSVC developer environment (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # Two Windows-only build-env fixes:
      #
      # 1. .cargo/config.toml routes the bundled CMake C/C++ build through
      #    scripts/ccache-launcher.sh, a POSIX sh script. Ninja can't
      #    CreateProcess a .sh on Windows (`%1 is not a valid Win32
      #    application`). Clear the launcher so CMake invokes cl.exe directly —
      #    a set env var overrides the non-forced [env] in config.toml, and
      #    ccache isn't installed on the Windows runner anyway.
      #
      # 2. CRT mismatch: lbug compiles its C++ with /MD (dynamic CRT, matching
      #    Rust's msvc default), but esaxx-rs hardcodes `.static_crt(true)` ->
      #    /MT, so linking the addon fails with LNK2038/LNK1319. Force /MD for
      #    cc-built C++ deps via target-scoped CXXFLAGS/CFLAGS (cc appends env
      #    flags last, so /MD wins over esaxx's /MT at cl.exe). Target-scoped so
      #    host build-script compiles are untouched.
      - name: Configure Windows C/C++ build env
        if: runner.os == 'Windows'
        shell: bash
        run: |
          echo "CMAKE_C_COMPILER_LAUNCHER=" >> "$GITHUB_ENV"
          echo "CMAKE_CXX_COMPILER_LAUNCHER=" >> "$GITHUB_ENV"
          echo "CFLAGS_x86_64_pc_windows_msvc=/MD" >> "$GITHUB_ENV"
          echo "CXXFLAGS_x86_64_pc_windows_msvc=/MD" >> "$GITHUB_ENV"

      - name: ccache (lbug bundled C++, restore-only)
        if: runner.os != 'Windows'
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: java-lbug-cxx-${{ matrix.platform }}
          max-size: 1G
          save: true

      - name: Cache cargo (Java JNI workspace)
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: java-jni-${{ matrix.platform }}-v1
          workspaces: java/cognee-java-jni -> target
          cache-on-failure: true

      - name: Cache ORT binary
        uses: actions/cache@v4
        with:
          path: java/cognee-java-jni/target/ort-cache
          key: java-ort-v2.0.0-rc.12-cpu-${{ matrix.platform }}

      - name: Set up JDK (for the jar tool)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # Seed ort-sys's download cache from the cognee-hosted ONNX Runtime mirror
      # so the build does not depend on cdn.pyke.io, which (via Cloudflare) 403s
      # GitHub Actions runner IPs on ort-cache misses. Best-effort: on any
      # failure the script exits 0 and the build falls back to the normal pyke
      # download. Runs on the host and seeds the same dir both build steps use —
      # the cross container sees it via its /target mount (ORT_CACHE_DIR maps to
      # /target/ort-cache). Windows path handling differs, and the Windows leg
      # was unaffected; wire it in if that changes. See docs/ci/ort-mirror.md.
      - name: Prefetch ONNX Runtime from mirror
        if: runner.os != 'Windows'
        shell: bash
        run: ci/ort/prefetch.sh "${{ matrix.rust-target }}" "${{ github.workspace }}/java/cognee-java-jni/target/ort-cache"

      # Build the cdylib for the target platform.
      - name: Build cdylib (native)
        if: "!matrix.cross"
        working-directory: java/cognee-java-jni
        env:
          ORT_CACHE_DIR: ${{ github.workspace }}/java/cognee-java-jni/target/ort-cache
        run: cargo build --release --target ${{ matrix.rust-target }}

      - name: Build cdylib (cross)
        if: matrix.cross
        working-directory: java/cognee-java-jni
        # cognee-java-jni stays a standalone workspace; java/cognee-java-jni/Cross.toml
        # mounts the whole repo (volumes=COGNEE_REPO_ROOT) so its ../../crates
        # path-deps resolve in the container, and selects a gcc-11 image for the
        # arm64 target (lbug needs C++20 / libstdc++ 11). cross mounts the crate
        # target at /target. Disable simsimd's advanced ARM SIMD kernels (SVE /
        # NEON-bf16) the cross toolchain can't assemble.
        env:
          ORT_CACHE_DIR: /target/ort-cache
          COGNEE_REPO_ROOT: ${{ github.workspace }}
        run: |
          SVE="-DSIMSIMD_TARGET_NEON_I8=0 -DSIMSIMD_TARGET_NEON_F16=0 -DSIMSIMD_TARGET_NEON_BF16=0 -DSIMSIMD_TARGET_SVE=0 -DSIMSIMD_TARGET_SVE_I8=0 -DSIMSIMD_TARGET_SVE_F16=0 -DSIMSIMD_TARGET_SVE_BF16=0 -DSIMSIMD_TARGET_SVE2=0"
          TGT_US=$(echo "${{ matrix.rust-target }}" | tr '-' '_')
          export CFLAGS_${TGT_US}="$SVE" CXXFLAGS_${TGT_US}="$SVE"
          cross build --release --target ${{ matrix.rust-target }}

      - name: Stage native lib and pack classifier jar
        shell: bash
        run: |
          VER=$(sed -n 's:.*<version>\(.*\)</version>.*:\1:p' java/pom.xml | head -1)
          SRC="java/cognee-java-jni/target/${{ matrix.rust-target }}/release/${{ matrix.libfile }}"
          STAGE="staging/native/${{ matrix.classifier }}"
          mkdir -p "$STAGE"
          cp "$SRC" "$STAGE/${{ matrix.libfile }}"
          jar cf "cognee-${VER}-${{ matrix.classifier }}.jar" -C staging native
          echo "built cognee-${VER}-${{ matrix.classifier }}.jar"

      - name: Upload classifier jar
        uses: actions/upload-artifact@v4
        with:
          name: java-${{ matrix.classifier }}
          path: cognee-*-${{ matrix.classifier }}.jar
          retention-days: 7

  # ── Token gate ───────────────────────────────────────────────────────
  # Secrets cannot be referenced in a job-level `if:`, so a precheck job
  # exposes their presence as a boolean output the publish job gates on.
  # Absent secrets (the pre-infra state) → has_token=false → publish skips.
  check-token:
    name: Check Central token
    runs-on: ubuntu-latest
    outputs:
      has_token: ${{ steps.check.outputs.has_token }}
    steps:
      - id: check
        env:
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
        run: |
          if [ -n "$MAVEN_CENTRAL_PASSWORD" ]; then
            echo "has_token=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_token=false" >> "$GITHUB_OUTPUT"
            echo "::notice::MAVEN_CENTRAL_PASSWORD not set — skipping Maven Central publish."
          fi

  # ── Publish to Maven Central ─────────────────────────────────────────
  # Builds the main + sources + javadoc jars, attaches the 4 classifier
  # native jars from the matrix, GPG-signs everything, and uploads a bundle
  # to the Central Portal (autoPublish=false → a human reviews + releases).
  # Requires build-platform to succeed (do not publish an incomplete native
  # set) AND the token to be present.
  publish:
    name: Publish to Maven Central
    needs: [build-platform, check-token]
    if: ${{ needs.check-token.outputs.has_token == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17 + Central credentials + GPG key
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          server-id: central
          server-username: MAVEN_CENTRAL_USERNAME
          server-password: MAVEN_CENTRAL_PASSWORD
          gpg-private-key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Download classifier native jars
        uses: actions/download-artifact@v4
        with:
          pattern: java-*
          path: /tmp/java-natives
          merge-multiple: true

      - name: Verify all four classifier jars are present
        run: |
          VER=$(sed -n 's:.*<version>\(.*\)</version>.*:\1:p' java/pom.xml | head -1)
          missing=0
          for c in linux-x86_64 linux-aarch_64 osx-aarch_64 windows-x86_64; do
            f="/tmp/java-natives/cognee-${VER}-${c}.jar"
            if [ ! -f "$f" ]; then echo "::error::missing native jar $f"; missing=1; fi
          done
          [ "$missing" = 0 ] || exit 1

      - name: Deploy signed bundle to the Central Portal
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
        run: |
          mvn -B --no-transfer-progress \
            -P release,attach-natives \
            -Dnatives.dir=/tmp/java-natives \
            -DskipTests \
            -f java/pom.xml \
            deploy
