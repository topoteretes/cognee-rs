name: capi-release

# Build per-platform C-API release tarballs on a `v*` tag push and attach
# them to the GitHub Release for that tag. Mirrors `ts-prebuild.yml`'s
# tag-triggered multi-platform pattern but ships native libs + headers
# instead of Neon `.node` binaries.
#
# Track A in `docs/RELEASE.md` describes the manual equivalent; this
# workflow is the automated path. Both code paths share
# `capi/scripts/build-release-tarball.sh`.

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      tag:
        description: "Manual tag (e.g. v0.1.0) for dry-run / re-upload."
        required: true
        type: string

permissions:
  contents: write   # required by softprops/action-gh-release

concurrency:
  group: capi-release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_INCREMENTAL: "0"
  CARGO_PROFILE_RELEASE_DEBUG: "0"

jobs:
  # ── Build per-platform release tarballs ──────────────────────────────
  build:
    name: Build ${{ matrix.archive_suffix }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 — native runner
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            cross: false
            archive_suffix: linux-x86_64

          # Linux aarch64 — cross via `cross`
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            cross: true
            archive_suffix: linux-aarch64

          # NOTE: no macos-x86_64 (x86_64-apple-darwin). ort 2.0.0-rc.12 ships no
          # prebuilt ONNX Runtime for that target (its dist manifest bundles ORT
          # 1.24.2, which Microsoft no longer builds for x86_64 macOS as of ORT
          # 1.24.1), so ort-sys errors "does not provide prebuilt binaries for the
          # target x86_64-apple-darwin". Intel macOS is also EOL and GitHub is
          # retiring its x86_64 runners. Dropped rather than carry a red leg —
          # matches ts-prebuild.yml, which dropped darwin-x64 for the same reason.

          # macOS aarch64 (Apple Silicon). macos-15 (Xcode 16.4): the older
          # macos-14 default (Xcode 15.4) ships a libc++ whose std::construct_at
          # trips a C++20 aggregate-init bug compiling lbug's bundled C++.
          - os: macos-15
            target: aarch64-apple-darwin
            cross: false
            archive_suffix: macos-aarch64

          # Windows x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            cross: false
            archive_suffix: windows-x86_64

    runs-on: ${{ matrix.os }}
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Install cross for cross-compilation jobs (Linux aarch64).
      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      # Native build deps — mirror ts-prebuild.yml.
      - name: Install native build deps (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y cmake protobuf-compiler

      - name: Install native build deps (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake protobuf

      - name: Install native build deps (Windows)
        if: runner.os == 'Windows'
        run: choco install cmake protoc --no-progress

      # lbug forces the CMake "Ninja" generator; Ninja+MSVC needs cl.exe/link.exe
      # already on PATH via the MSVC dev environment, else it fails with
      # `ninja: CreateProcess: %1 is not a valid Win32 application`. (Ported from
      # ts-prebuild.yml, where the same lbug build required it.)
      - name: Set up MSVC developer environment (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # Two Windows-only build-env fixes (mirror ts-prebuild.yml):
      # 1. Clear the ccache launcher: .cargo/config.toml routes CMake C/C++
      #    through a POSIX-sh script Ninja can't CreateProcess on Windows.
      # 2. Force /MD for cc-built C++ deps (esaxx-rs hardcodes /MT -> LNK2038
      #    against lbug's /MD). Target-scoped so host build-scripts are untouched.
      - name: Configure Windows C/C++ build env
        if: runner.os == 'Windows'
        shell: bash
        run: |
          echo "CMAKE_C_COMPILER_LAUNCHER=" >> "$GITHUB_ENV"
          echo "CMAKE_CXX_COMPILER_LAUNCHER=" >> "$GITHUB_ENV"
          echo "CFLAGS_x86_64_pc_windows_msvc=/MD" >> "$GITHUB_ENV"
          echo "CXXFLAGS_x86_64_pc_windows_msvc=/MD" >> "$GITHUB_ENV"

      - name: Cache cargo (capi workspace)
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: capi-release-${{ matrix.archive_suffix }}-v1
          workspaces: capi -> target
          cache-on-failure: true

      # ort-sys downloads the ONNX Runtime binary into ORT_CACHE_DIR
      # (capi/target/ort-cache; the cross build sees it at /target/ort-cache via
      # the mount). Cache it across runs. Windows uses pyke directly (not 403'd,
      # not mirrored).
      - name: Cache ORT binary
        if: runner.os != 'Windows'
        uses: actions/cache@v4
        with:
          path: capi/target/ort-cache
          key: capi-ort-${{ matrix.archive_suffix }}-v1

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG="${{ inputs.tag }}"
          fi
          if [ -z "$TAG" ]; then
            echo "::error::Could not resolve a tag for this run"
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Resolved tag: $TAG"

      - name: Header sync gate
        shell: bash
        run: bash capi/scripts/check_header_sync.sh

      # Seed ort-sys's cache from the cognee-hosted ONNX Runtime mirror so the
      # build doesn't depend on cdn.pyke.io (which 403s runner IPs). Best-effort;
      # falls back to pyke on any miss. Seeds capi/target/ort-cache, which the
      # cross container sees at /target/ort-cache. See docs/ci/ort-mirror.md.
      - name: Prefetch ONNX Runtime from mirror
        if: runner.os != 'Windows'
        shell: bash
        run: ci/ort/prefetch.sh "${{ matrix.target }}" "${{ github.workspace }}/capi/target/ort-cache"

      - name: Build release library (native)
        if: "!matrix.cross"
        shell: bash
        env:
          ORT_CACHE_DIR: ${{ github.workspace }}/capi/target/ort-cache
        run: cargo build --release --manifest-path capi/Cargo.toml --target ${{ matrix.target }}

      - name: Build release library (cross)
        if: matrix.cross
        working-directory: capi
        shell: bash
        # Run from capi/ so cross picks up capi/Cross.toml (repo mount via
        # COGNEE_REPO_ROOT so ../crates path-deps resolve; gcc-11 + libssl image).
        # cross mounts capi/target at /target. Disable simsimd's advanced ARM SIMD
        # kernels the cross toolchain can't assemble (basic NEON + serial remain).
        env:
          ORT_CACHE_DIR: /target/ort-cache
          COGNEE_REPO_ROOT: ${{ github.workspace }}
        run: |
          SVE="-DSIMSIMD_TARGET_NEON_I8=0 -DSIMSIMD_TARGET_NEON_F16=0 -DSIMSIMD_TARGET_NEON_BF16=0 -DSIMSIMD_TARGET_SVE=0 -DSIMSIMD_TARGET_SVE_I8=0 -DSIMSIMD_TARGET_SVE_F16=0 -DSIMSIMD_TARGET_SVE_BF16=0 -DSIMSIMD_TARGET_SVE2=0"
          TGT_US=$(echo "${{ matrix.target }}" | tr '-' '_')
          export CFLAGS_${TGT_US}="$SVE" CXXFLAGS_${TGT_US}="$SVE"
          cross build --release --target ${{ matrix.target }}

      - name: Assemble release tarball
        shell: bash
        run: bash capi/scripts/build-release-tarball.sh "${{ steps.tag.outputs.tag }}" "${{ matrix.target }}" "${{ matrix.archive_suffix }}"

      - name: Upload tarball artifact
        uses: actions/upload-artifact@v4
        with:
          name: cognee-capi-${{ steps.tag.outputs.tag }}-${{ matrix.archive_suffix }}
          path: dist/*
          if-no-files-found: error
          retention-days: 14

  # ── Attach all tarballs to the GitHub Release ────────────────────────
  release:
    name: Attach to GitHub Release
    needs: build
    runs-on: ubuntu-latest
    # Attach on a real tag push, or on a manual workflow_dispatch (so a failed
    # release can be re-cut without force-moving the tag — the dispatch input
    # supplies the tag to attach to).
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG="${{ inputs.tag }}"
          fi
          if [ -z "$TAG" ]; then
            echo "::error::Could not resolve a tag to attach to"
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Download all platform artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List downloaded artifacts
        run: ls -la artifacts/

      - name: Attach tarballs to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # Explicit tag_name: on workflow_dispatch github.ref is a branch, so
          # the action can't infer the tag from the ref like it does on push.
          tag_name: ${{ steps.tag.outputs.tag }}
          files: artifacts/*
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
